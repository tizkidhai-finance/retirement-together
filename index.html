function renderWealthSummary(c) {
  const assets = c.assets || [];
  const cashFlows = c.cashFlows || [];
  const insurance = c.insurance || { life:[], health:[], critical:[], pension:[] };
  
  // Stock totals
  const totalAssets = assets.reduce((s, a) => s + (Number(a.value)||0), 0);
  const retirementAssets = assets.filter(a => a.useForRetirement).reduce((s, a) => s + (Number(a.value)||0), 0);
  const nonRetirementAssets = totalAssets - retirementAssets;
  
  // Flow totals
  const monthlyFlow = cashFlows.filter(cf => cf.useForRetirement).reduce((s, cf) => s + (Number(cf.monthly)||0), 0);
  const annualFlow = monthlyFlow * 12;
  
  // Insurance totals
  const lifeCover = (insurance.life||[]).reduce((s, i) => s + (Number(i.sumInsured)||0), 0);
  const criticalCover = (insurance.critical||[]).reduce((s, i) => s + (Number(i.sumInsured)||0), 0);
  const healthCover = (insurance.health||[]).reduce((s, i) => s + (Number(i.sumInsured)||0), 0);
  const pensionCover = (insurance.pension||[]).reduce((s, i) => s + (Number(i.sumInsured)||0), 0);
  const totalCover = lifeCover + criticalCover;
  
  // Premiums  
  const totalPremium = ['life','health','critical','pension'].reduce((s, t) => 
    s + (insurance[t]||[]).reduce((ss, i) => ss + (Number(i.premium)||0), 0), 0);
  
  // Empty state
  if (totalAssets === 0 && monthlyFlow === 0 && totalCover === 0 && healthCover === 0) {
    return `
      <div class="section-block" style="background:linear-gradient(135deg,#f5f6f8,#fff); border:2px dashed var(--grey-line)">
        <div style="text-align:center; padding:30px 20px; color:var(--grey-text)">
          <div style="font-size:32px; margin-bottom:8px">📦</div>
          <h3 style="color:var(--navy); margin-bottom:6px">Wealth Summary</h3>
          <p style="font-size:14px">เพิ่มสินทรัพย์/กระแสเงินสด/ประกัน เพื่อดูสรุปความมั่งคั่งของลูกค้า</p>
        </div>
      </div>
    `;
  }
  
  return `
    <div class="wealth-summary">
      <div class="ws-header">
        <div class="ws-eyebrow">WEALTH SUMMARY</div>
        <h3 class="ws-title">สรุปความมั่งคั่ง · สิ่งที่ลูกค้ามีอยู่</h3>
      </div>
      
      <!-- Stock (Assets) -->
      <div class="ws-card stock">
        <div class="ws-card-header">
          <span class="ws-card-icon">💰</span>
          <span class="ws-card-label">STOCK · สินทรัพย์รวม</span>
        </div>
        <div class="ws-card-big">${fmt(totalAssets)} <span class="unit">฿</span></div>
        ${nonRetirementAssets > 0 ? `
          <div class="ws-breakdown">
            <div class="ws-bd-row">
              <span class="ws-bd-label">✓ ใช้สำหรับเกษียณ</span>
              <span class="ws-bd-val good">${fmt(retirementAssets)} ฿</span>
            </div>
            <div class="ws-bd-row">
              <span class="ws-bd-label">✗ ไม่ใช้เกษียณ (เช่น บ้านอยู่อาศัย)</span>
              <span class="ws-bd-val muted">${fmt(nonRetirementAssets)} ฿</span>
            </div>
          </div>
        ` : ''}
      </div>
      
      <!-- Flow (Cashflow after retirement) -->
      ${monthlyFlow > 0 ? `
        <div class="ws-card flow">
          <div class="ws-card-header">
            <span class="ws-card-icon">💵</span>
            <span class="ws-card-label">FLOW · กระแสเงินสดหลังเกษียณ</span>
          </div>
          <div class="ws-card-big">${fmt(monthlyFlow)} <span class="unit">฿/เดือน</span></div>
          <div class="ws-card-sub">${fmt(annualFlow)} ฿/ปี</div>
        </div>
      ` : ''}
      
      <!-- Insurance Coverage -->
      ${(totalCover > 0 || healthCover > 0 || pensionCover > 0) ? `
        <div class="ws-card cover">
          <div class="ws-card-header">
            <span class="ws-card-icon">🛡️</span>
            <span class="ws-card-label">COVER · เกราะปกป้องที่มีอยู่</span>
          </div>
          ${totalCover > 0 ? `
            <div class="ws-card-big">${fmt(totalCover)} <span class="unit">฿</span></div>
            <div class="ws-card-sub">ทุนคุ้มครองชีวิต + โรคร้าย</div>
          ` : ''}
          ${healthCover > 0 ? `<div class="ws-bd-row" style="margin-top:8px"><span class="ws-bd-label">+ ค่ารักษา/โรค</span><span class="ws-bd-val">${fmt(healthCover)} ฿</span></div>` : ''}
          ${pensionCover > 0 ? `<div class="ws-bd-row"><span class="ws-bd-label">+ บำนาญ</span><span class="ws-bd-val">${fmt(pensionCover)} ฿</span></div>` : ''}
          ${totalPremium > 0 ? `<div class="ws-bd-row" style="border-top:1px dashed var(--grey-line); margin-top:6px; padding-top:6px"><span class="ws-bd-label">เบี้ยที่จ่ายอยู่</span><span class="ws-bd-val">${fmt(totalPremium)} ฿/ปี</span></div>` : ''}
        </div>
      ` : ''}
      
      <!-- Footer tip -->
      <div class="ws-tip">
        💡 ใน Phase 5 (Timeline) ปุ่ม "ดึงสินทรัพย์ + ดึงกระแสเงินสด" จะใช้ตัวเลขนี้คำนวณ Gap เกษียณให้
      </div>
    </div>
  `;
}

function quickAddAsset(name) {
  const c = getActive();
  if (!c.assets) c.assets = [];
  c.assets.push({ id: 'a_'+Date.now(), name: name, value: 0, useForRetirement: true });
  saveAndRefresh();
  document.getElementById('assetsList').innerHTML = renderAssetsList(c);
  // Focus on the value field of the new item
  setTimeout(() => {
    const inputs = document.querySelectorAll('#assetsList input[type="number"]');
    const last = inputs[inputs.length - 1];
    if (last) last.focus();
  }, 50);
  SFX.pop();
}

function renderAssetsList(c) {
  if (!c.assets || c.assets.length === 0) return '<p class="text-grey small">ยังไม่มี — กดปุ่มด้านล่าง</p>';
  return c.assets.map((a, i) => `
    <div class="row-grid" style="grid-template-columns: 2fr 1.2fr auto auto">
      <input type="text" value="${a.name||''}" placeholder="ชื่อสินทรัพย์" 
             oninput="updateAssetField(${i}, 'name', this.value)">
      <input type="number" value="${a.value||''}" placeholder="มูลค่า (บาท)" 
             oninput="updateAssetField(${i}, 'value', Number(this.value)||0)">
      <label class="use-checkbox">
        <input type="checkbox" ${a.useForRetirement?'checked':''} 
               onchange="updateAssetField(${i}, 'useForRetirement', this.checked)">
        <span>ใช้เกษียณ</span>
      </label>
      <button class="remove-btn" onclick="removeAsset(${i})">×</button>
    </div>`).join('');
}

function addAsset() {
  const c = getActive();
  if (!c.assets) c.assets = [];
  c.assets.push({ id: 'a_'+Date.now(), name: '', value: 0, useForRetirement: true });
  saveAndRefresh();
  document.getElementById('assetsList').innerHTML = renderAssetsList(c);
  SFX.pop();
}

function updateAssetField(idx, field, val) {
  const c = getActive();
  if (!c.assets[idx]) return;
  c.assets[idx][field] = val;
  c.updatedAt = Date.now();
  saveAndRefresh();
}

function removeAsset(idx) {
  const c = getActive();
  c.assets.splice(idx, 1);
  saveAndRefresh();
  document.getElementById('assetsList').innerHTML = renderAssetsList(c);
  SFX.remove();
}

function renderCashFlowList(c) {
  if (!c.cashFlows || c.cashFlows.length === 0) {
    return '<div class="bd-empty" style="background:#fafbfc; border:1.5px solid var(--grey-line); border-radius:10px; padding:18px;">ยังไม่มี — กดปุ่มด้านล่างเพื่อเพิ่ม</div>';
  }
  const total = c.cashFlows.filter(cf => cf.useForRetirement).reduce((s, cf) => s + (Number(cf.monthly)||0), 0);
  let html = `<div class="breakdown-zone" style="margin-top:0">`;
  c.cashFlows.forEach((cf, i) => {
    html += `
      <div class="breakdown-row" style="grid-template-columns: 1.3fr 2fr 1.2fr auto auto">
        <select onchange="updateCashFlowField(${i}, 'type', this.value)" style="padding:8px 10px; border:1px solid var(--grey-line); border-radius:6px; font-size:14px; background:white">
          <option value="">-- ประเภท --</option>
          <option value="rent" ${cf.type==='rent'?'selected':''}>ค่าเช่า</option>
          <option value="pension" ${cf.type==='pension'?'selected':''}>บำนาญประกัน</option>
          <option value="govPension" ${cf.type==='govPension'?'selected':''}>บำนาญข้าราชการ</option>
          <option value="dividend" ${cf.type==='dividend'?'selected':''}>เงินปันผล</option>
          <option value="interest" ${cf.type==='interest'?'selected':''}>ดอกเบี้ย</option>
          <option value="royalty" ${cf.type==='royalty'?'selected':''}>ค่าลิขสิทธิ์</option>
          <option value="salary" ${cf.type==='salary'?'selected':''}>เงินเดือนหลังเกษียณ</option>
          <option value="other" ${cf.type==='other'?'selected':''}>อื่นๆ</option>
        </select>
        <input type="text" value="${cf.note||''}" placeholder="รายละเอียด เช่น คอนโดให้เช่า"
               oninput="updateCashFlowField(${i}, 'note', this.value)"
               data-preserve-focus="cf-note-${i}">
        <input type="number" class="bd-amount" value="${cf.monthly||''}" placeholder="บาท/เดือน" 
               oninput="updateCashFlowField(${i}, 'monthly', Number(this.value)||0)"
               data-preserve-focus="cf-monthly-${i}">
        <button type="button" class="bd-flag ${cf.useForRetirement?'active':''}"
                onclick="toggleCashFlowUse(${i})">
          ${cf.useForRetirement ? '✓ ใช้เกษียณ' : '✗ ไม่ใช้'}
        </button>
        <button type="button" class="bd-remove" onclick="removeCashFlow(${i})">×</button>
      </div>`;
  });
  html += `<div class="bd-summary">
    <span>รวมกระแสเงินสดสำหรับเกษียณ</span>
    <span class="bd-total regular" id="bd-total-cashflow">${fmt(total)} ฿/เดือน · ${fmt(total*12)} ฿/ปี</span>
  </div>`;
  html += `</div>`;
  return html;
}

function toggleCashFlowUse(idx) {
  const c = getActive();
  if (!c.cashFlows[idx]) return;
  c.cashFlows[idx].useForRetirement = !c.cashFlows[idx].useForRetirement;
  saveAndRefresh();
  document.getElementById('cashFlowList').innerHTML = renderCashFlowList(c);
}

function addCashFlow() {
  const c = getActive();
  if (!c.cashFlows) c.cashFlows = [];
  c.cashFlows.push({ id: 'cf_'+Date.now(), type: '', note: '', monthly: 0, useForRetirement: true });
  saveAndRefresh();
  document.getElementById('cashFlowList').innerHTML = renderCashFlowList(c);
  SFX.pop();
}

function updateCashFlowField(idx, field, val) {
  const c = getActive();
  if (!c.cashFlows[idx]) return;
  c.cashFlows[idx][field] = val;
  c.updatedAt = Date.now();
  saveAndRefresh();
  // Update only summary if amount changes (don't re-render to preserve cursor)
  if (field === 'monthly') {
    const total = c.cashFlows.filter(cf => cf.useForRetirement).reduce((s, cf) => s + (Number(cf.monthly)||0), 0);
    const totalEl = document.getElementById('bd-total-cashflow');
    if (totalEl) totalEl.textContent = fmt(total) + ' ฿/เดือน · ' + fmt(total*12) + ' ฿/ปี';
  }
}

function removeCashFlow(idx) {
  const c = getActive();
  c.cashFlows.splice(idx, 1);
  saveAndRefresh();
  document.getElementById('cashFlowList').innerHTML = renderCashFlowList(c);
  SFX.remove();
}

function renderInsuranceList(c, type) {
  if (!c.insurance) c.insurance = { life: [], health: [], critical: [], pension: [] };
  if (!c.insurance[type]) c.insurance[type] = [];
  const list = c.insurance[type];
  if (list.length === 0) return '<p class="text-grey small">ยังไม่มี</p>';
  
  if (type === 'life') {
    return list.map((ins, i) => `
      <div class="row-grid" style="grid-template-columns: 1.2fr 1fr 1fr 1fr auto; align-items:end; gap:8px">
        <div class="form-field"><label>บริษัท</label>
          <input value="${ins.company||''}" oninput="updateInsField('${type}',${i},'company',this.value)"></div>
        <div class="form-field"><label>ทุนประกัน</label>
          <input type="number" value="${ins.sumInsured||''}" oninput="updateInsField('${type}',${i},'sumInsured',Number(this.value)||0)"></div>
        <div class="form-field"><label>เบี้ย/ปี</label>
          <input type="number" value="${ins.premium||''}" oninput="updateInsField('${type}',${i},'premium',Number(this.value)||0)"></div>
        <div class="form-field"><label>ประเภท</label>
          <input value="${ins.subtype||''}" oninput="updateInsField('${type}',${i},'subtype',this.value)" placeholder="ตลอดชีพ"></div>
        <button class="remove-btn" onclick="removeIns('${type}',${i})">×</button>
      </div>`).join('');
  }
  
  if (type === 'health') {
    return list.map((ins, i) => `
      <div class="row-grid" style="grid-template-columns: 1fr 1fr 1fr 1fr 1fr auto; align-items:end; gap:8px">
        <div class="form-field"><label>บริษัท</label>
          <input value="${ins.company||''}" oninput="updateInsField('${type}',${i},'company',this.value)"></div>
        <div class="form-field"><label>IPD/ครั้ง</label>
          <input type="number" value="${ins.ipd||''}" oninput="updateInsField('${type}',${i},'ipd',Number(this.value)||0)"></div>
        <div class="form-field"><label>ค่าห้อง</label>
          <input type="number" value="${ins.room||''}" oninput="updateInsField('${type}',${i},'room',Number(this.value)||0)"></div>
        <div class="form-field"><label>OPD</label>
          <input type="number" value="${ins.opd||''}" oninput="updateInsField('${type}',${i},'opd',Number(this.value)||0)"></div>
        <div class="form-field"><label>เบี้ย/ปี</label>
          <input type="number" value="${ins.premium||''}" oninput="updateInsField('${type}',${i},'premium',Number(this.value)||0)"></div>
        <button class="remove-btn" onclick="removeIns('${type}',${i})">×</button>
      </div>`).join('');
  }
  
  if (type === 'critical') {
    return list.map((ins, i) => `
      <div class="row-grid" style="grid-template-columns: 1.2fr 1fr 1fr 1fr auto; align-items:end; gap:8px">
        <div class="form-field"><label>บริษัท</label>
          <input value="${ins.company||''}" oninput="updateInsField('${type}',${i},'company',this.value)"></div>
        <div class="form-field"><label>ทุนโรคร้าย</label>
          <input type="number" value="${ins.sumInsured||''}" oninput="updateInsField('${type}',${i},'sumInsured',Number(this.value)||0)"></div>
        <div class="form-field"><label>เบี้ย/ปี</label>
          <input type="number" value="${ins.premium||''}" oninput="updateInsField('${type}',${i},'premium',Number(this.value)||0)"></div>
        <div class="form-field"><label>ครอบคลุม</label>
          <input value="${ins.coverage||''}" oninput="updateInsField('${type}',${i},'coverage',this.value)" placeholder="50 โรค"></div>
        <button class="remove-btn" onclick="removeIns('${type}',${i})">×</button>
      </div>`).join('');
  }
  
  if (type === 'pension') {
    return list.map((ins, i) => `
      <div class="row-grid" style="grid-template-columns: 1fr 1fr 1fr 1fr 1fr auto; align-items:end; gap:8px">
        <div class="form-field"><label>บริษัท</label>
          <input value="${ins.company||''}" oninput="updateInsField('${type}',${i},'company',this.value)"></div>
        <div class="form-field"><label>ทุนประกัน</label>
          <input type="number" value="${ins.sumInsured||''}" oninput="updateInsField('${type}',${i},'sumInsured',Number(this.value)||0)"></div>
        <div class="form-field"><label>เบี้ย/ปี</label>
          <input type="number" value="${ins.premium||''}" oninput="updateInsField('${type}',${i},'premium',Number(this.value)||0)"></div>
        <div class="form-field"><label>บำนาญ/ปี</label>
          <input type="number" value="${ins.annualPension||''}" oninput="updateInsField('${type}',${i},'annualPension',Number(this.value)||0)"></div>
        <div class="form-field"><label>รับถึงอายุ</label>

        <button class="remove-btn" onclick="removeIns('${type}',${i})">×</button>
      </div>`).join('');
  }
  return '';
}

function addInsurance(type) {
  const c = getActive();
  if (!c.insurance) c.insurance = { life: [], health: [], critical: [], pension: [] };
  if (!c.insurance[type]) c.insurance[type] = [];
  c.insurance[type].push({ id: type+'_'+Date.now(), company: '' });
  saveAndRefresh();

function collectAllAssetItems(c) {
  const items = [];
  (c.assets||[]).forEach(a => {
    items.push({
      id: a.id,
      kind: 'asset',
      label: a.name || '(ไม่ระบุ)',
      val: a.value ? `${fmt(a.value)} ฿` : ''
    });
  });
  ['life','health','critical','pension'].forEach(type => {
    (c.insurance?.[type] || []).forEach((ins, i) => {
      const id = `ins_${type}_${i}`;
      const icons = { life: '🛡️', health: '🏥', critical: '⚕️', pension: '👴' };
      const labels = { life: 'ประกันชีวิต', health: 'ประกันสุขภาพ', critical: 'โรคร้าย', pension: 'บำนาญ' };
      items.push({
        id,
        kind: 'insurance',
        label: `${icons[type]} ${ins.company || labels[type]}`,
        val: ins.sumInsured ? `ทุน ${fmt(ins.sumInsured)} ฿` : (ins.premium ? `${fmt(ins.premium)} ฿/ปี` : '')
      });
    });
  });
  return items;
}

function renderTierContent(c, tier, showExplainers) {
  const placed = c.pyramidBefore || {};
  const allItems = collectAllAssetItems(c);
  const explainers = showExplainers ? TIER_EXPLAINERS.filter(e => e.tier === tier) : [];
  
  const items = [];
  
  // Real items placed in this tier
  allItems.forEach(item => {
    if (placed[item.id] === tier) {
      items.push(`<div class="asset-chip placed-${tier}" data-asset-id="${item.id}" draggable="true">
        ${item.label}${item.val ? ` <span class="val">${item.val}</span>` : ''}
      </div>`);
    }
  });
  
  // Explainer chips (not draggable)
  explainers.forEach(e => {
    items.push(`<div class="asset-chip tier-explainer">${e.text}</div>`);
  });
  
  return items.join('');
}

function renderAssetChipHTML(item) {
  return `<div class="asset-chip" data-asset-id="${item.id}" draggable="true">
    ${item.label}${item.val ? ` <span class="val">${item.val}</span>` : ''}
  </div>`;
}

function renderPyramidStars(c) {
  const placed = c.pyramidBefore || {};
  const placedCount = Object.keys(placed).length;
  if (placedCount === 0) return '<span class="text-grey small">ลากสินทรัพย์ลงไปวาง</span>';
  
  const baseCount = Object.values(placed).filter(t => t === 'base').length;
  const insBase = ['life','health','critical','pension'].some(type => 
    (c.insurance?.[type] || []).some((_, i) => placed[`ins_${type}_${i}`] === 'base'));
  
  let score = 0;
  if (baseCount >= 1) score++;
  if (baseCount >= 2) score++;
  if (insBase) score++;
  if (baseCount >= 3) score++;
  if (baseCount >= 4) score++;
  
  return '⭐'.repeat(score) + '☆'.repeat(5-score);
}

function checkStability() {
  const c = getActive();
  const placed = c.pyramidBefore || {};
  const placedCount = Object.keys(placed).length;
  
  // Analysis: ฐานต้องมีอะไรบ้าง?
  const inBase = Object.entries(placed).filter(([_, t]) => t === 'base').map(([id]) => id);
  const inMid = Object.entries(placed).filter(([_, t]) => t === 'mid').map(([id]) => id);
  const inTop = Object.entries(placed).filter(([_, t]) => t === 'top').map(([id]) => id);
  
  // Check what's at base
  const hasEmergencyFund = (c.assets||[]).some(a => 
    placed[a.id] === 'base' && /ฉุกเฉิน|สำรอง|deposit|ฝาก|เงินสด|cash/i.test(a.name||''));
  
  const insuranceTypes = ['life', 'health', 'critical', 'pension'];
  const insuranceAtBase = {};
  insuranceTypes.forEach(type => {
    insuranceAtBase[type] = (c.insurance?.[type]||[]).some((_, i) => 
      placed[`ins_${type}_${i}`] === 'base');
  });
  
  const hasHealth = insuranceAtBase.health;
  const hasLife = insuranceAtBase.life;
  const hasCritical = insuranceAtBase.critical;
  
  // Score
  const checks = [
    { ok: hasEmergencyFund, label: 'เงินสำรองฉุกเฉินอยู่ฐาน', tip: 'แนะนำเงินฝาก/cash 6 เดือนของรายจ่าย' },
    { ok: hasHealth, label: 'ประกันสุขภาพอยู่ฐาน', tip: 'ป้องกันค่ารักษาพยาบาลที่อาจมาแบบไม่ทันตั้งตัว' },
    { ok: hasLife, label: 'ประกันชีวิตอยู่ฐาน', tip: 'ปกป้องครอบครัวและภาระทางการเงิน' },
    { ok: hasCritical, label: 'ประกันโรคร้ายอยู่ฐาน', tip: 'ป้องกันค่าใช้จ่ายโรคร้ายที่เกินประกันสุขภาพ' },
    { ok: inBase.length >= 3, label: 'มีสินทรัพย์ฐานอย่างน้อย 3 รายการ', tip: 'กระจายความเสี่ยงในชั้นฐาน' }
  ];
  
  const passed = checks.filter(ch => ch.ok).length;
  const stable = passed >= 4;
  
  // Render result
  const resultEl = document.getElementById('stabilityResult');
  const pyramidEl = document.getElementById('pyramidWrap');
  
  if (resultEl) {
    resultEl.classList.remove('hidden');
    resultEl.innerHTML = `
      <div class="section-block ${stable ? 'green' : 'red'}" style="margin-top: 16px;">
        <h3 style="display:flex; align-items:center; gap:10px">
          ${stable ? '✅ ฐานแน่น มั่นคง 5 ดาว' : '⚠️ ฐานยังไม่แน่น ต้องเสริมเพิ่ม'}
          <span style="font-size:14px; color:var(--grey-text); font-weight:500">(${passed}/${checks.length})</span>
        </h3>
        <div style="margin-top:12px">
          ${checks.map(ch => `
            <div style="display:flex; align-items:flex-start; gap:8px; padding:6px 0; font-size:14px">
              <span style="font-size:18px">${ch.ok ? '✅' : '⚠️'}</span>
              <div>
                <div style="font-weight:600; color:${ch.ok ? 'var(--green-dark)' : 'var(--red)'}">${ch.label}</div>
                ${!ch.ok ? `<div style="color:var(--grey-text); font-size:13px">${ch.tip}</div>` : ''}
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
    resultEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
  
  // Trigger shake if not stable, fix-pulse if stable
  if (pyramidEl) {
    pyramidEl.classList.remove('shake-stable', 'shake-unstable');
    void pyramidEl.offsetWidth; // force reflow
    if (stable) {
      pyramidEl.classList.add('shake-stable');
      SFX.success();
    } else {
      pyramidEl.classList.add('shake-unstable');
      SFX.remove();
    }
  }
}

function renderPhase5RealityCheck(c, m) {
  const f = c.finance || {};
  const monthlyIncome = Number(f.monthlyIncome) || 0;
  const monthlyExpense = Number(f.monthlyExpense) || 0;
  const monthlyDebt = (Number(f.debtHouse)||0) + (Number(f.debtCar)||0) + 
                      (Number(f.debtCard)||0) + (Number(f.debtOther)||0);
  const surplusRegular = monthlyIncome - monthlyExpense - monthlyDebt;
  const irregular = (f.incomeBreakdown||[]).filter(it => it.regular === false)
    .reduce((s, it) => s + (Number(it.amount)||0), 0);
  const surplusFull = surplusRegular + irregular;
  
  const pmtMonthly = Math.round((m.annualPMT || 0) / 12);
  const gap = pmtMonthly - surplusFull;
  
  // Don't show if Phase 2 not filled
  if (monthlyIncome === 0) return '';
  
  let status, title, msg;
  if (pmtMonthly === 0) {
    return ''; // No gap, no need
  } else if (gap <= 0) {
    status = 'safe';
    title = '✅ เงินที่กันได้พอเก็บเพิ่ม';
    msg = `เงินที่กันได้ ${fmt(surplusFull)}/เดือน ≥ ที่ต้องเก็บ ${fmt(pmtMonthly)}/เดือน — เพียงพอ`;
  } else if (surplusFull > 0 && gap <= surplusFull * 0.5) {
    status = 'warning';
    title = '🟡 เงินที่กันได้ตึง — ต้องปรับ';
    msg = `ขาดอีก ${fmt(gap)}/เดือน · อาจต้องปรับรายจ่าย หรือใช้สินทรัพย์ที่มีช่วยเสริม`;
  } else {
    status = 'danger';
    title = '🔴 เงินที่กันได้ไม่พอ — ต้องวางแผนใหม่';
    msg = `ขาดอีก ${fmt(gap)}/เดือน · ใช้รายได้ประจำเก็บเพิ่มไม่ไหว — Phase 6 จะมีแนวทางช่วย`;
  }
  
  return `
    <div class="reality-check ${status}">
      <div class="rc-header">
        <span class="rc-icon">🚦</span>
        <span class="rc-title">${title}</span>
      </div>
      <div class="rc-row">
        <div class="rc-cell">
          <div class="rc-label">ต้องเก็บเพิ่ม</div>
          <div class="rc-val red">${fmt(pmtMonthly)} ฿/เดือน</div>
        </div>
        <div class="rc-cell">
          <div class="rc-label">เงินที่กันได้</div>
          <div class="rc-val ${surplusFull < 0 ? 'red' : 'green'}">${surplusFull < 0 ? '' : '+'}${fmt(surplusFull)} ฿/เดือน</div>
          <div class="rc-sub">${irregular > 0 ? `(รวมรายได้ไม่ประจำ ${fmt(irregular)})` : 'จากรายได้ประจำ'}</div>
        </div>
        <div class="rc-cell">
          <div class="rc-label">${gap > 0 ? 'ขาดอีก' : 'เหลือเก็บ'}</div>
          <div class="rc-val ${gap > 0 ? 'red' : 'green'}">${gap > 0 ? '−' : '+'}${fmt(Math.abs(gap))} ฿/เดือน</div>
        </div>
      </div>
      <div class="rc-msg">${msg}</div>
      ${gap > 0 ? '<div class="rc-cta">→ ไปต่อ Phase 6 — เลือกแนวทางที่เหมาะกับคุณ</div>' : ''}
    </div>
  `;
}

function pullCashFlowData() {
  const c = getActive();
  const cfAnnual = calcAnnualCashFlow(c);
  // Inflate cash flow to retirement year
  const yearsToRetire = (c.goal.retireAge||60) - (c.goal.currentAge||30);
  const inflated = cfAnnual * Math.pow(1.03, yearsToRetire);
  c.goal.cashFlowAnnual = Math.round(inflated);
  c.goal.cashFlowPulled = true;
  saveAndRefresh();
  render();
  SFX.success();
  showToast('ดึงกระแสเงินสดสำเร็จ', 'success');
}

function pullAssetsData() {
  const c = getActive();
  c.goal.assetsAmount = calcAssetsForRetirement(c);
  c.goal.assetsPulled = true;
  saveAndRefresh();

// === AIA Premium Tables (ปี 2025 · ไม่สูบบุหรี่) ===
// อ้างอิงจาก AIA iSell · Pay Life Plus 20Pay(NP) + Riders

// AIA Health Happy (เหมาจ่าย แบบมาตรฐานใหม่)
const HEALTH_HAPPY_TABLE = {
  M: {
    35: { 1000000: 15100, 5000000: 18900, 15000000: 29400, 25000000: 37800 },
    45: { 1000000: 19200, 5000000: 23800, 15000000: 36000, 25000000: 47300 },
    55: { 1000000: 28300, 5000000: 35000, 15000000: 50100, 25000000: 65300 }
  },
  F: {
    35: { 1000000: 18400, 5000000: 22700, 15000000: 34200, 25000000: 42300 },
    45: { 1000000: 22300, 5000000: 27800, 15000000: 42900, 25000000: 53600 },
    55: { 1000000: 28500, 5000000: 35200, 15000000: 50700, 25000000: 65500 }
  }
};

// AIA Multi-Pay CI (Plus) · Linear กับทุน — เก็บแค่เบี้ย/1M
const MPCI_TABLE = {
  M: { 35: 5780, 45: 15470, 55: 46620 },
  F: { 35: 5840, 45: 9300, 55: 27710 }
};

// AIA Total Care (rider) · Linear กับทุน — เก็บแค่เบี้ย/1M
const TOTAL_CARE_TABLE = {
  M: { 35: 830, 45: 1400, 55: 3110 },
  F: { 35: 390, 45: 740, 55: 1450 }
};

// 20 Pay Life Plus · เบี้ย/1M (เพราะ scale linear)
// ทุน 150k → /150 × 1M conversion
const LIFE_WL_TABLE = {
  M: { 35: 28190, 45: 37350, 55: 50530 },  // 4228.5/0.15, 5602.5/0.15, 7579.5/0.15
  F: { 35: 23660, 45: 31260, 55: 43440 }   // 3549/0.15, 4689/0.15, 6516/0.15
};

// AIA Infinite Wealth · anchor 45 + extrapolate
// anchor: M 45 = 555k/15M = 37,000/M · F 45 = 525k/15M = 35,000/M
// extrapolate ใช้ pattern จาก 20 Pay Life
const LIFE_UL_TABLE = {
  M: { 35: 28000, 45: 37000, 55: 50000 },
  F: { 35: 26500, 45: 35000, 55: 48500 }
};

const LIFE_UL_THRESHOLD = 15_000_000;

// Guide สำหรับสุขภาพ + โรคร้าย — 3 ระดับ
const HEALTH_GUIDES = [
  { id: 'basic', label: 'Basic', sumInsured: 1000000, desc: 'ค่ารักษาทั่วไป' },
  { id: 'standard', label: 'Standard', sumInsured: 5000000, desc: 'รักษาดีขึ้น + ห้องดี' },
  { id: 'comprehensive', label: 'Premium', sumInsured: 15000000, desc: 'เหมาจ่าย ครอบคลุมเต็ม' }
];
const CRITICAL_GUIDES = [
  { id: 'basic', label: 'Basic', sumInsured: 1000000, desc: 'ค่ารักษามะเร็งทั่วไป' },
  { id: 'income', label: 'Income Replace', sumInsured: 2000000, desc: 'รักษา + รายได้ทดแทน' },
  { id: 'full', label: 'Full', sumInsured: 3000000, desc: 'ครอบคลุมเต็มที่' }
];

// Map gender Thai → key
function genderKey(c) {
  const g = (c?.profile?.gender || '').trim();
  return g === 'หญิง' ? 'F' : 'M';  // default M (ชาย/อื่น/ว่าง)
}

// Linear interpolation between two age points
function lerp(x, x0, x1, y0, y1) {
  if (x1 === x0) return y0;
  return y0 + (y1 - y0) * (x - x0) / (x1 - x0);
}

// Interpolate age within table {35, 45, 55}
function interpAge(table, age) {
  if (age <= 35) return table[35];
  if (age >= 55) return table[55];
  if (age <= 45) return lerp(age, 35, 45, table[35], table[45]);
  return lerp(age, 45, 55, table[45], table[55]);
}

// Health Happy: ทุน 1M / 5M / 15M / 25M with age + gender
function calcHealthHappyPremium(sumInsured, age, gender) {
  if (!sumInsured || sumInsured < 1000000) return 0;  // ขั้นต่ำ 1M
  const tableForGender = HEALTH_HAPPY_TABLE[gender] || HEALTH_HAPPY_TABLE.M;
  
  // Interpolate per cover at this age
  const cap = Math.min(sumInsured, 25000000);  // ขั้นสูง 25M
  
  // Get premium at each cover-anchor for this age
  const anchorCovers = [1000000, 5000000, 15000000, 25000000];
  const anchorPrems = anchorCovers.map(cv => {
    const tableByCv = { 35: tableForGender[35][cv], 45: tableForGender[45][cv], 55: tableForGender[55][cv] };
    return interpAge(tableByCv, age);
  });
  
  // Interpolate by cover
  if (cap <= 1000000) return Math.round(anchorPrems[0]);
  if (cap >= 25000000) return Math.round(anchorPrems[3]);
  if (cap <= 5000000) return Math.round(lerp(cap, 1000000, 5000000, anchorPrems[0], anchorPrems[1]));
  if (cap <= 15000000) return Math.round(lerp(cap, 5000000, 15000000, anchorPrems[1], anchorPrems[2]));
  return Math.round(lerp(cap, 15000000, 25000000, anchorPrems[2], anchorPrems[3]));
}

// MPCI + Total Care (รวมเป็น "โรคร้าย")
function calcCriticalPremium(sumInsured, age, gender) {
  if (!sumInsured) return 0;
  const cap = Math.min(sumInsured, 3000000);  // ขั้นสูง 3M
  const sumM = cap / 1000000;
  
  const mpciTable = MPCI_TABLE[gender] || MPCI_TABLE.M;
  const tcTable = TOTAL_CARE_TABLE[gender] || TOTAL_CARE_TABLE.M;
  
  const mpciPerM = interpAge(mpciTable, age);
  const tcPerM = interpAge(tcTable, age);
  
  return Math.round((mpciPerM + tcPerM) * sumM);
}

// 20 Pay Life Plus / Infinite Wealth
function calcLifePremium(sumInsured, age, gender) {
  if (!sumInsured) return 0;
  const sumM = sumInsured / 1000000;
  const isUL = sumInsured >= LIFE_UL_THRESHOLD;
  const table = isUL 
    ? (LIFE_UL_TABLE[gender] || LIFE_UL_TABLE.M)
    : (LIFE_WL_TABLE[gender] || LIFE_WL_TABLE.M);
  const perM = interpAge(table, age);
  return Math.round(perM * sumM);
}

function chooseLifeProduct(sumInsured) {
  return sumInsured >= LIFE_UL_THRESHOLD ? 'lifeUL' : 'lifeWL';
}

// Generic dispatcher (legacy compat)
function calcInsurePremium(sumInsured, type, age, gender) {
  if (type === 'health') return calcHealthHappyPremium(sumInsured, age, gender);
  if (type === 'critical') return calcCriticalPremium(sumInsured, age, gender);
  if (type === 'lifeWL' || type === 'lifeUL') return calcLifePremium(sumInsured, age, gender);
  return 0;
}

function calcDisposable(c) {
  const f = c.finance || {};
  const monthlyIncome = Number(f.monthlyIncome) || 0;
  const monthlyExpense = Number(f.monthlyExpense) || 0;
  const monthlyDebt = (Number(f.debtHouse)||0) + (Number(f.debtCar)||0) + 
                      (Number(f.debtCard)||0) + (Number(f.debtOther)||0);
  const surplusRegular = monthlyIncome - monthlyExpense - monthlyDebt;
  const irregular = (f.incomeBreakdown||[]).filter(it => it.regular === false)
    .reduce((s, it) => s + (Number(it.amount)||0), 0);
  return Math.round((surplusRegular + irregular) * 12);
}

// === Existing insurance (จาก Phase 3) ===
function getExistingInsurance(c) {
  const ins = c.insurance || {};
  return {
    life: (ins.life||[]).reduce((s,i)=>s+(Number(i.sumInsured)||0),0),
    health: (ins.health||[]).reduce((s,i)=>s+(Number(i.sumInsured)||0),0),
    critical: (ins.critical||[]).reduce((s,i)=>s+(Number(i.sumInsured)||0),0),
    pension: (ins.pension||[]).reduce((s,i)=>s+(Number(i.sumInsured)||0),0),
    lifeCount: (ins.life||[]).length,
    healthCount: (ins.health||[]).length,
    criticalCount: (ins.critical||[]).length,
    pensionCount: (ins.pension||[]).length
  };
}

function renderPhase6(c) {
  const g = c.goal || {};
  const m = calcRetirement(c);
  const f = c.finance || {};
  const age = fmtAge(c.profile.dob) || g.currentAge || 35;
  
  // Init plan state
  if (!c.plan) c.plan = {};
  if (!c.plan.choice) {
    c.plan.choice = {
      // ออมเพิ่ม
      saveActive: false,
      saveAnnual: 0,
      // สุขภาพ
      healthActive: false,
      healthGuide: 'basic',
      healthSum: 1000000,
      healthUseGov: false,
      // โรคร้าย
      criticalActive: false,
      criticalGuide: 'basic',
      criticalSum: 1000000,
      // ชีวิต
      lifeActive: false,
      lifeMode: 'custom',  // 'A' | 'B' | 'custom'
      lifeSum: 1500000,
      lifeBYears: 5
    };
  }
  const ch = c.plan.choice;
  
  // คำนวณ
  const disposable = calcDisposable(c);
  const pmtAnnual = m.annualPMT || 0;
  const pmtMonthly = Math.round(pmtAnnual / 12);
  const existing = getExistingInsurance(c);
  
  const monthlyIncome = Number(f.monthlyIncome) || 0;
  const monthlyExpense = Number(f.monthlyExpense) || 0;
  
  // คำนวณ Mode B จากรายได้สามี (รายได้รวม) × ปี
  const modeBSum = (monthlyIncome * 12) * (ch.lifeBYears || 5);
  // คำนวณ Mode A — gap
  const modeASum = m.gap || 0;
  
  // กำหนดทุนชีวิตตาม mode
  let actualLifeSum = ch.lifeSum;
  if (ch.lifeActive) {
    if (ch.lifeMode === 'A') actualLifeSum = modeASum;
    else if (ch.lifeMode === 'B') actualLifeSum = modeBSum;
    // custom = ใช้ ch.lifeSum
  }
  
  const lifeProduct = chooseLifeProduct(actualLifeSum);
  
  // Premiums
  const gender = genderKey(c);
  const healthPremium = (ch.healthActive && !ch.healthUseGov) ? calcInsurePremium(ch.healthSum, 'health', age, gender) : 0;
  const criticalPremium = ch.criticalActive ? calcInsurePremium(ch.criticalSum, 'critical', age, gender) : 0;
  const lifePremium = ch.lifeActive ? calcInsurePremium(actualLifeSum, lifeProduct, age, gender) : 0;
  const totalInsure = healthPremium + criticalPremium + lifePremium;
  const totalSave = ch.saveActive ? (ch.saveAnnual || 0) : 0;

  // Sync to legacy fields
  c.plan.sumInsured = actualLifeSum;
  c.plan.premium = totalInsure;
  c.plan.product = ch.lifeActive 
    ? (lifeProduct === 'lifeUL' ? 'AIA Infinite Wealth' : 'AIA 20 Pay Life Plus')
    : '';
  c.plan.adjustPMT = totalSave || pmtAnnual;
  c.plan.adjustReturnRate = g.returnRate || 7;

function renderCommitmentSummary(totalSave, totalInsure, totalCommit, disposable) {

  }
  
  const pct = disposable > 0 ? (totalCommit / disposable * 100) : 0;
  const insurePct = disposable > 0 ? (totalInsure / disposable * 100) : 0;
  
  let budgetClass, budgetMsg;
  if (pct > 100) {
    budgetClass = 'danger';
    budgetMsg = '🔴 รวมเกินเงินที่ใช้ได้ · ต้องลดบางส่วน';
  } else if (pct > 80) {
    budgetClass = 'warning';
    budgetMsg = '🟡 ตึงๆ · ใกล้เต็มงบ';
  } else {
    budgetClass = 'safe';

  }
  
  let insureMsg = '';
  if (insurePct > 50) insureMsg = '⚠️ เบี้ยเกิน 50% ของเงินที่ใช้ได้ · เสี่ยงเวนคืน';
  else if (insurePct > 30) insureMsg = '🟡 เบี้ย 30-50% ของเงินที่ใช้ได้ · ตึง';
  
  return `
    <div class="commitment-summary ${budgetClass}">
      <div class="cs-header">📋 สรุปแผนรวม</div>
      <div class="cs-row">
        <div class="cs-cell">
          <div class="cs-label">เก็บกองทุน/ปี</div>

        </div>

function calcAdjustedRetireAge(c, saveAnnual) {
  const g = c.goal || {};
  const m = calcRetirement(c);
  const r = (g.returnRate || 7) / 100;
  const targetCorpus = m.requiredCorpus;
  const fvAssets = m.fvOfAssets || 0;
  const gap = Math.max(0, targetCorpus - fvAssets);
  
  if (saveAnnual <= 0) {
    return { 
      status: 'danger', icon: '🔴', 
      title: 'ไม่ออม',
      msg: 'อาจต้องเลื่อนเกษียณ หรือใช้สินทรัพย์ที่มี + กระแสเงินสด' 
    };
  }
  if (saveAnnual >= m.annualPMT) {
    return { 
      status: 'safe', icon: '🟢', 
      title: `เกษียณตามแผน อายุ ${g.retireAge||60}`,
      msg: `ออม ${fmt(saveAnnual)}/ปี ≥ เป้า ${fmt(m.annualPMT)}/ปี` 
    };
  }
  let years;
  if (r > 0) years = Math.log(1 + gap * r / saveAnnual) / Math.log(1 + r);
  else years = gap / saveAnnual;
  const newAge = Math.ceil((g.currentAge||30) + years);
  const delta = newAge - (g.retireAge||60);
  return { 
    status: delta <= 2 ? 'warning' : 'danger', 
    icon: delta <= 2 ? '🟡' : '🟠', 
    title: `เกษียณช้ากว่าแผน ${delta} ปี`,
    msg: `ออม ${fmt(saveAnnual)}/ปี → ถึงเป้าที่อายุ ${newAge}` 
  };
}

function renderULInsight(c, currentAge, retireAge, sumInsured, annualPremium, gender) {
  // ใช้ pattern จาก AIA real data (ชาย 45 → 60: NAV @5% = 10.84M / @2% = ~9.4M / @-1% = ~7.5M)
  // pattern: NAV ~ premium_paid × multiplier (depends on years, return)
  const yearsToRetire = retireAge - currentAge;
  const yearsPaid = Math.min(yearsToRetire, 20); // จ่าย 20 ปี
  const totalPaid = annualPremium * yearsPaid;
  
  // multiplier ตาม return (อ้างจากข้อมูล AIA Infinite Wealth จริง)
  // ปี 15-20: เริ่ม break-even ที่ 2%, กำไร 30% ที่ 5%
  // อายุ 60+ (หลังจ่ายครบ): cash value ทบดอกเบี้ย
  const yearsAfterPaid = Math.max(0, yearsToRetire - 20);
  
  // Estimate NAV at retire age
  const estimateNAV = (returnRate) => {
    const r = returnRate / 100;
    // Step 1: build cash value during 20 years of payments (assume 50% of premium goes to investment)
    // Approximation based on AIA Infinite Wealth real data
    let nav = 0;
    const investRatio = 0.85; // 85% goes to investment after costs
    for (let yr = 1; yr <= yearsPaid; yr++) {
      nav = (nav + annualPremium * investRatio) * (1 + r);
    }
    // Step 2: compound during years after paid (no more premiums)
    for (let yr = 1; yr <= yearsAfterPaid; yr++) {
      nav = nav * (1 + r);
    }
    return Math.round(nav);
  };
  
  const navLow = estimateNAV(-1);   // -1% (worst)
  const navMid = estimateNAV(2);    // 2% (moderate)
  const navHigh = estimateNAV(5);   // 5% (good)
  
  return `
    <div class="ul-insight">
      <div class="uli-eyebrow">⭐ พลังของ Infinite Wealth</div>
      <div class="uli-title">ตอนเกษียณอายุ ${retireAge} ปี · คุณจะมี 2 ทางเลือก</div>
      
      <div class="uli-grid">
        <div class="uli-option">
          <div class="uli-icon">🛡️</div>
          <div class="uli-opt-title">ทางที่ 1 · เก็บคุ้มครองต่อ</div>
          <div class="uli-opt-detail">
            ทุนคุ้มครอง <b>${fmt(sumInsured)}</b> ฿ ตลอดชีวิต<br>
            <span class="uli-sub">→ ครอบครัวได้ ${fmt(sumInsured)} ฿ ถ้าวันใดไม่อยู่ (Legacy)</span>
          </div>
        </div>
        
        <div class="uli-option">
          <div class="uli-icon">💰</div>
          <div class="uli-opt-title">ทางที่ 2 · ถอนเงินก้อนใช้</div>
          <div class="uli-opt-detail">
            มูลค่ารับซื้อคืน (NAV) ประมาณ:<br>
            <div class="uli-nav-rows">
              <div class="uli-nav-row low"><span>ตอน return -1%</span><b>${fmt(navLow)} ฿</b></div>
              <div class="uli-nav-row mid"><span>ตอน return 2%</span><b>${fmt(navMid)} ฿</b></div>
              <div class="uli-nav-row high"><span>ตอน return 5%</span><b>${fmt(navHigh)} ฿</b></div>
            </div>
          </div>
        </div>
      </div>
      
      <div class="uli-summary">
        <div class="uli-sum-row">

function renderProtectSummary(ch, healthPremium, criticalPremium, lifePremium, lifeSum, lifeProduct, totalInsure) {
  const items = [];
  
  if (ch.healthActive) {
    if (ch.healthUseGov) {
      items.push({ icon: '🏥', label: 'ประกันสุขภาพ', detail: 'ใช้สวัสดิการรัฐ', premium: 0 });
    } else {
      items.push({ icon: '🏥', label: 'ประกันสุขภาพ', detail: `ทุน ${fmt(ch.healthSum)} ฿`, premium: healthPremium });
    }
  }
  if (ch.criticalActive) {
    items.push({ icon: '⚠️', label: 'ประกันโรคร้าย', detail: `ทุน ${fmt(ch.criticalSum)} ฿`, premium: criticalPremium });
  }
  if (ch.lifeActive) {
    const productLabel = lifeProduct === 'lifeUL' ? 'Infinite Wealth' : '20 Pay Life Plus';
    items.push({ icon: '🛡️', label: 'ประกันชีวิต', detail: `ทุน ${fmt(lifeSum)} ฿ · ${productLabel}`, premium: lifePremium });
  }
  
  return `
    <div class="sum-card protect">
      <div class="sum-icon">🛡️</div>
      <div class="sum-title">ส่วนปกป้อง</div>
      
      ${items.length === 0 ? `
        <div class="sum-empty">
          <div>ไม่มีประกันที่จะทำเพิ่ม</div>
          <div class="sum-empty-sub">(หรือใช้สวัสดิการรัฐทั้งหมด)</div>
        </div>
      ` : `
        <div class="protect-items">
          ${items.map(it => `
            <div class="prot-item">
              <div class="prot-head">
                <span class="prot-icon">${it.icon}</span>
                <span class="prot-label">${it.label}</span>
                <span class="prot-prem">${it.premium > 0 ? fmt(it.premium) + ' ฿/ปี' : 'ไม่มีค่าเบี้ย'}</span>
              </div>
              <div class="prot-detail">${it.detail}</div>
            </div>
          `).join('')}
        </div>
      `}
      
      <div class="sum-divider"></div>
      
      <div class="sum-row big">
        <span class="sum-label">เบี้ยรวม/ปี</span>
        <span class="sum-val red">${fmt(totalInsure)} ฿</span>
      </div>
      <div class="sum-row">
        <span class="sum-label">เบี้ย/เดือน</span>
        <span class="sum-val">~${fmt(Math.round(totalInsure/12))} ฿</span>
      </div>
    </div>
  `;
}

function renderCommitmentFinal(saveAnnual, totalInsure, totalCommit, pct, disposable) {
  let cls = 'safe', msg = '🟢 อยู่ในงบที่ไหว';
  if (pct > 100) { cls = 'danger'; msg = '🔴 รวมเกินเงินที่ใช้ได้ · ต้องลดบางส่วน'; }
  else if (pct > 80) { cls = 'warning'; msg = '🟡 ตึงๆ · ใกล้เต็มงบ'; }
  
  if (totalCommit === 0) return `
    <div class="commit-final empty">
      <div class="cf-empty">⚠️ ยังไม่ได้เลือกแผน — กลับ Phase 6 เลือกที่ต้องการทำ</div>
    </div>
  `;
  
  return `
    <div class="commit-final ${cls}">
      <div class="cf-title">📋 สิ่งที่ต้องทำ/ปี</div>
      <div class="cf-grid">
        <div class="cf-cell">
          <div class="cf-label">เก็บกองทุน</div>
          <div class="cf-val">${fmt(saveAnnual)} ฿</div>
        </div>
        <div class="cf-plus">+</div>
        <div class="cf-cell">
          <div class="cf-label">เบี้ยประกัน</div>
          <div class="cf-val">${fmt(totalInsure)} ฿</div>
        </div>
        <div class="cf-equals">=</div>
        <div class="cf-cell big">
          <div class="cf-label">รวม commitment</div>
          <div class="cf-val">${fmt(totalCommit)} ฿/ปี</div>
          <div class="cf-sub">~${fmt(Math.round(totalCommit/12))} ฿/เดือน</div>
        </div>
      </div>
      <div class="cf-pct">
        <span>% ของเงินที่ใช้ได้ (${fmt(disposable)} ฿/ปี)</span>
        <span class="cf-pct-val">${pct.toFixed(0)}%</span>
      </div>
      <div class="cf-msg">${msg}</div>
    </div>
  `;
}

function renderBeforeAfter(c, m, ex, ch, totalInsure, saveAnnual) {
  const pmtAnnual = m.annualPMT || 0;
  
  // ก่อน: ใช้สิ่งที่มี (ไม่ออม + ไม่ประกันใหม่)
  const beforeSaving = 0;
  const beforeInsureSum = ex.life;
  
  // หลัง: ออม + ประกันใหม่ (รวมเดิม)
  const afterSaving = saveAnnual;
  const afterLifeSum = ex.life + (ch.lifeActive ? (
    ch.lifeMode === 'A' ? m.gap : 
    ch.lifeMode === 'B' ? (Number((c.finance||{}).monthlyIncome)||0) * 12 * (ch.lifeBYears||5) :
    ch.lifeSum
  ) : 0);
  
  const afterHealthOk = ch.healthActive || ex.healthCount > 0;
  const afterCriticalOk = ch.criticalActive || ex.criticalCount > 0;
  
  // Stability score before/after
  const baseChecksBefore = [
    ex.lifeCount > 0,
    ex.healthCount > 0,
    ex.criticalCount > 0
  ].filter(Boolean).length;
  
  const baseChecksAfter = [
    afterLifeSum > 0,
    afterHealthOk,
    afterCriticalOk
  ].filter(Boolean).length;
  
  // เกษียณ
  const beforeReachGoal = m.fvOfAssets >= m.requiredCorpus;
  const afterReachGoal = saveAnnual >= pmtAnnual;
  
  return `
    <div class="before-after">
      <div class="ba-eyebrow">⚖️ ก่อน-หลัง · เห็น Impact</div>
      <div class="ba-grid">
        <!-- ก่อน -->
        <div class="ba-col before">
          <div class="ba-col-title">📍 ก่อนทำแผน</div>
          
          <div class="ba-row">
            <div class="ba-row-label">เป้าเกษียณ</div>
            <div class="ba-row-val ${beforeReachGoal ? 'good' : 'bad'}">
              ${beforeReachGoal ? '✅ ครบ' : '❌ ขาด ' + fmt(m.gap) + ' ฿'}
            </div>
          </div>
          
          <div class="ba-row">
            <div class="ba-row-label">ฐานปกป้อง</div>
            <div class="ba-row-val ${baseChecksBefore >= 2 ? 'good' : 'bad'}">${baseChecksBefore}/3</div>
          </div>
          
          <div class="ba-row">
            <div class="ba-row-label">ทุนชีวิตรวม</div>
            <div class="ba-row-val">${fmt(beforeInsureSum)} ฿</div>
          </div>
          
          <div class="ba-row">
            <div class="ba-row-label">เก็บเพิ่ม/ปี</div>
            <div class="ba-row-val">—</div>
          </div>
        </div>
        
        <!-- arrow -->
        <div class="ba-arrow">→</div>
        
        <!-- หลัง -->
        <div class="ba-col after">
          <div class="ba-col-title">✨ หลังทำแผน</div>
          
          <div class="ba-row">
            <div class="ba-row-label">เป้าเกษียณ</div>
            <div class="ba-row-val ${afterReachGoal ? 'good' : 'partial'}">
              ${afterReachGoal ? '✅ ครบตามเป้า' : (saveAnnual > 0 ? '⚡ เกษียณช้า · มีออม' : '⚠️ ใช้ของที่มี')}
            </div>
          </div>
          
          <div class="ba-row">
            <div class="ba-row-label">ฐานปกป้อง</div>
            <div class="ba-row-val ${baseChecksAfter >= 2 ? 'good' : 'partial'}">${baseChecksAfter}/3</div>
          </div>
          
          <div class="ba-row">
            <div class="ba-row-label">ทุนชีวิตรวม</div>
            <div class="ba-row-val good">${fmt(afterLifeSum)} ฿</div>
          </div>
          
          <div class="ba-row">
            <div class="ba-row-label">เก็บเพิ่ม/ปี</div>
            <div class="ba-row-val good">${fmt(afterSaving)} ฿</div>
          </div>
        </div>
      </div>
    </div>
  `;
}

/* ============================================================
   DRAG & DROP
   ============================================================ */
function initPhaseInteractions() {
  if (currentPhase === 4) setupPyramidDragDrop();
}

function setupPyramidDragDrop() {
  const chips = document.querySelectorAll('.asset-chip:not(.tier-explainer)');
  const tiers = document.querySelectorAll('.pyramid-tier');
  const bin = document.getElementById('assetBin');
  
  let dragChip = null;
  let touchClone = null;
  
  chips.forEach(chip => {
    if (chip.classList.contains('tier-explainer')) return;
    chip.draggable = true;
    
    chip.addEventListener('dragstart', (e) => {
      dragChip = chip;
      chip.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    chip.addEventListener('dragend', () => {
      chip.classList.remove('dragging');
      dragChip = null;
    });
    
    chip.addEventListener('touchstart', (e) => {
      dragChip = chip;
      chip.classList.add('dragging');
      const rect = chip.getBoundingClientRect();
      touchClone = chip.cloneNode(true);
      touchClone.style.position = 'fixed';
      touchClone.style.zIndex = 9999;
      touchClone.style.opacity = 0.85;
      touchClone.style.pointerEvents = 'none';
      touchClone.style.left = rect.left + 'px';
      touchClone.style.top = rect.top + 'px';
      touchClone.style.width = rect.width + 'px';
      document.body.appendChild(touchClone);
      e.preventDefault();
    }, { passive: false });
    
    chip.addEventListener('touchmove', (e) => {
      if (!touchClone) return;
      const t = e.touches[0];
      touchClone.style.left = (t.clientX - 40) + 'px';
      touchClone.style.top = (t.clientY - 20) + 'px';
      e.preventDefault();
    }, { passive: false });
    
    chip.addEventListener('touchend', (e) => {
      if (!dragChip) return;
      const t = e.changedTouches[0];
      const target = document.elementFromPoint(t.clientX, t.clientY);
      const tier = target?.closest('.pyramid-tier');
      const binTarget = target?.closest('#assetBin');
      if (tier) handleDrop(dragChip, tier.getAttribute('data-tier'));
      else if (binTarget) handleDrop(dragChip, null);
      dragChip.classList.remove('dragging');
      if (touchClone) { touchClone.remove(); touchClone = null; }
      dragChip = null;
    });
  });
  
  tiers.forEach(tier => {
    tier.addEventListener('dragover', (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; });
    tier.addEventListener('drop', (e) => {
      e.preventDefault();
      if (!dragChip) return;
      handleDrop(dragChip, tier.getAttribute('data-tier'));
    });
  });
  
  if (bin) {
    bin.addEventListener('dragover', e => e.preventDefault());
    bin.addEventListener('drop', e => {
      e.preventDefault();
      if (!dragChip) return;
      handleDrop(dragChip, null);
    });
  }
}

function handleDrop(chip, tier) {
  const id = chip.getAttribute('data-asset-id');
  if (!id) return;
  const c = getActive();
  if (!c.pyramidBefore) c.pyramidBefore = {};
  if (tier) {
    c.pyramidBefore[id] = tier;
    SFX.drop();
  } else {
    delete c.pyramidBefore[id];
    SFX.remove();
  }
  saveAndRefresh();
  render();
}
