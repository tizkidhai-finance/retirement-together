<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เกษียนด้วยกัน by ติสคิดให้</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --navy: #0d1f3c;
  --navy-light: #1a2e52;
  --gold: #d4af37;
  --gold-light: #f4cf5a;
  --green: #27ae60;
  --green-dark: #1d8348;
  --red: #c0392b;
  --red-light: #e74c3c;
  --orange: #e67e22;
  --grey-bg: #f5f6f8;
  --grey-line: #d8dde3;
  --grey-text: #6c7a89;
  --shadow-sm: 0 2px 8px rgba(13,31,60,0.08);
  --shadow-md: 0 4px 16px rgba(13,31,60,0.15);
  --shadow-lg: 0 12px 40px rgba(13,31,60,0.22);
}
html { font-size: 18px; }  /* base bumped from 14 */
body {
  font-family: 'IBM Plex Sans Thai', system-ui, sans-serif;
  background: var(--grey-bg);
  color: #1a1a1a;
  font-size: 1rem;
  line-height: 1.5;
  min-height: 100vh;
}
button { font-family: inherit; cursor: pointer; border: none; font-size: 1rem; }
input, select, textarea { font-family: inherit; font-size: 1rem; }

/* TOP BAR */
.topbar {
  background: var(--navy);
  color: white;
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow-sm);
}
.topbar-brand { display: flex; align-items: center; gap: 12px; cursor: pointer; }
.topbar-logo {
  width: 42px; height: 42px;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
}
.topbar-title { font-size: 20px; font-weight: 700; }
.topbar-sub { font-size: 13px; color: rgba(255,255,255,0.6); }
.topbar-actions { display: flex; gap: 10px; align-items: center; }
.topbar-btn {
  background: rgba(255,255,255,0.12);
  color: white;
  padding: 10px 18px;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: background 0.2s;
}
.topbar-btn:hover { background: rgba(255,255,255,0.22); }
.sound-toggle {
  background: rgba(255,255,255,0.12);
  width: 44px; height: 44px;
  border-radius: 10px;
  font-size: 20px;
  color: white;
}
.sound-toggle:hover { background: rgba(255,255,255,0.22); }

.app { max-width: 1400px; margin: 0 auto; padding: 24px 20px; }

/* DASHBOARD */
.dashboard-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin-bottom: 24px;
  flex-wrap: wrap;
  gap: 16px;
}
.dashboard-title h1 {
  font-size: 32px;
  font-weight: 700;
  color: var(--navy);
}
.dashboard-title p { color: var(--grey-text); font-size: 16px; margin-top: 4px; }

.btn-primary {
  background: var(--navy);
  color: white;
  padding: 14px 26px;
  border-radius: 12px;
  font-weight: 600;
  font-size: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: all 0.2s;
}
.btn-primary:hover { background: var(--navy-light); transform: translateY(-1px); }
.btn-secondary {
  background: white;
  color: var(--navy);
  padding: 12px 22px;
  border-radius: 12px;
  font-weight: 500;
  font-size: 15px;
  border: 1.5px solid var(--grey-line);
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn-secondary:hover { background: #f8f9fa; border-color: var(--navy); }
.btn-action {
  background: var(--gold);
  color: var(--navy);
  padding: 12px 22px;
  border-radius: 12px;
  font-weight: 700;
  font-size: 15px;
  border: none;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn-action:hover { background: var(--gold-light); }

.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 14px;
  margin-bottom: 24px;
}
.stat-card {
  background: white;
  padding: 18px;
  border-radius: 14px;
  border: 1px solid var(--grey-line);
}
.stat-card .label { font-size: 13px; color: var(--grey-text); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; }
.stat-card .value { font-size: 30px; font-weight: 700; color: var(--navy); margin-top: 6px; }
.stat-card .sub { font-size: 13px; color: var(--grey-text); margin-top: 2px; }
.stat-card.green .value { color: var(--green); }
.stat-card.gold .value { color: var(--gold); }

.filter-bar {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  flex-wrap: wrap;
  align-items: center;
}
.search-box {
  flex: 1;
  min-width: 240px;
  background: white;
  border: 1.5px solid var(--grey-line);
  border-radius: 12px;
  padding: 12px 18px;
  font-size: 15px;
  outline: none;
}
.search-box:focus { border-color: var(--navy); }
.filter-pill {
  background: white;
  border: 1.5px solid var(--grey-line);
  padding: 10px 18px;
  border-radius: 999px;
  font-size: 14px;
  color: var(--grey-text);
  font-weight: 500;
  transition: all 0.15s;
}
.filter-pill.active { background: var(--navy); color: white; border-color: var(--navy); }
.filter-pill:hover:not(.active) { border-color: var(--navy); color: var(--navy); }

.customer-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 16px;
}
.customer-card {
  background: white;
  border-radius: 14px;
  padding: 20px;
  border: 1.5px solid var(--grey-line);
  transition: all 0.2s;
  cursor: pointer;
  position: relative;
}
.customer-card:hover {
  border-color: var(--navy);
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
}
.customer-card .status-dot {
  position: absolute;
  top: 20px;
  right: 20px;
  width: 12px; height: 12px;
  border-radius: 50%;
}
.status-in_progress { background: #3498db; }
.status-hot { background: var(--orange); }
.status-won { background: var(--green); }
.status-lost { background: var(--red); }
.status-paused { background: var(--grey-text); }

.customer-card .name {
  font-size: 19px;
  font-weight: 700;
  color: var(--navy);
  padding-right: 30px;
}
.customer-card .meta { font-size: 14px; color: var(--grey-text); margin-top: 4px; }
.customer-card .meta-row { font-size: 14px; color: #555; margin-top: 6px; }
.customer-card .meta-row b { color: #1a1a1a; }
.customer-card .progress-bar {
  margin-top: 14px;
  height: 8px;
  background: #eef0f3;
  border-radius: 99px;
  overflow: hidden;
}
.customer-card .progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--gold-light));
  transition: width 0.3s;
}
.customer-card .progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  color: var(--grey-text);
  margin-top: 8px;
}
.customer-card .actions { margin-top: 14px; display: flex; gap: 8px; }
.customer-card .actions button {
  flex: 1;
  padding: 8px;
  font-size: 13px;
  border-radius: 8px;
  border: 1.5px solid var(--grey-line);
  background: #f8f9fa;
  color: #555;
  font-weight: 500;
}
.customer-card .actions button:hover { background: var(--navy); color: white; border-color: var(--navy); }

.status-tag-row {
  margin-top: 12px;
  padding-top: 10px;
  border-top: 1px dashed var(--grey-line);
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  align-items: center;
}
.status-tag-label {
  font-size: 12px;
  color: var(--grey-text);
  font-weight: 500;
  margin-right: 4px;
}
.status-tag {
  padding: 5px 9px;
  font-size: 12px;
  border-radius: 99px;
  border: 1.5px solid var(--grey-line);
  background: white;
  color: var(--grey-text);
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}
.status-tag:hover { border-color: var(--navy); color: var(--navy); }
.status-tag.active.status-tag-in_progress { background: #3498db; color: white; border-color: #3498db; }
.status-tag.active.status-tag-hot { background: var(--orange); color: white; border-color: var(--orange); }
.status-tag.active.status-tag-won { background: var(--green); color: white; border-color: var(--green); }
.status-tag.active.status-tag-lost { background: var(--red); color: white; border-color: var(--red); }
.status-tag.active.status-tag-paused { background: var(--grey-text); color: white; border-color: var(--grey-text); }

.empty-state {
  text-align: center;
  padding: 80px 20px;
  background: white;
  border-radius: 14px;
  border: 2px dashed var(--grey-line);
}
.empty-state .icon { font-size: 64px; opacity: 0.3; }
.empty-state h3 { color: var(--navy); margin: 16px 0 6px; font-size: 22px; }
.empty-state p { color: var(--grey-text); margin-bottom: 20px; font-size: 15px; }

/* CUSTOMER VIEW */
.customer-banner {
  background: linear-gradient(135deg, var(--navy), var(--navy-light));
  color: white;
  border-radius: 14px;
  padding: 22px 28px;
  margin-bottom: 18px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
}
.customer-banner h2 { font-size: 26px; }
.customer-banner .meta { color: rgba(255,255,255,0.7); font-size: 15px; margin-top: 4px; }
.customer-banner .profile-tag {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 99px;
  font-size: 13px;
  font-weight: 700;
  background: var(--gold);
  color: var(--navy);
  margin-left: 10px;
  vertical-align: 3px;
}
.customer-banner .right-actions { display: flex; gap: 8px; }
.customer-banner .right-actions button {
  background: rgba(255,255,255,0.15);
  color: white;
  padding: 10px 18px;
  font-size: 15px;
  border-radius: 10px;
  font-weight: 500;
}
.customer-banner .right-actions button:hover { background: rgba(255,255,255,0.25); }

.phase-nav {
  background: white;
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 18px;
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 8px;
  border: 1.5px solid var(--grey-line);
}
.phase-nav-item {
  background: #f5f6f8;
  border: 2px solid transparent;
  padding: 12px 6px;
  border-radius: 10px;
  text-align: center;
  font-size: 13px;
  font-weight: 500;
  color: var(--grey-text);
  transition: all 0.15s;
}
.phase-nav-item:hover { border-color: var(--navy); color: var(--navy); }
.phase-nav-item.active {
  background: var(--navy);
  color: white;
  border-color: var(--navy);
}
.phase-nav-item.done { background: #eaf6ee; color: var(--green-dark); }
.phase-nav-item.done.active { background: var(--green-dark); color: white; }
.phase-nav-item .num { display: block; font-size: 18px; font-weight: 700; margin-bottom: 3px; }

.phase-container {
  background: white;
  border-radius: 14px;
  padding: 28px;
  border: 1.5px solid var(--grey-line);
  margin-bottom: 18px;
}
.phase-header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding-bottom: 18px;
  border-bottom: 1.5px solid var(--grey-line);
  margin-bottom: 24px;
}
.phase-badge {
  background: var(--navy);
  color: white;
  padding: 6px 14px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.5px;
}
.phase-header h2 { font-size: 26px; color: var(--navy); }

/* FORMS */
.form-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 16px;
  margin-bottom: 16px;
}
.form-grid.cols-2 { grid-template-columns: repeat(2, 1fr); }
.form-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
.form-grid.cols-4 { grid-template-columns: repeat(4, 1fr); }
@media (max-width: 760px) {
  .form-grid.cols-2, .form-grid.cols-3, .form-grid.cols-4 { grid-template-columns: 1fr; }
}

.form-field { display: flex; flex-direction: column; }
.form-field label {
  font-size: 14px;
  color: var(--grey-text);
  font-weight: 600;
  margin-bottom: 6px;
}
.form-field input, .form-field select, .form-field textarea {
  padding: 12px 16px;
  border: 1.5px solid var(--grey-line);
  border-radius: 10px;
  background: white;
  outline: none;
  transition: border 0.15s;
  font-size: 16px;
}
.form-field input:focus, .form-field select:focus, .form-field textarea:focus {
  border-color: var(--navy);
}
.form-field .helper { font-size: 13px; color: var(--grey-text); margin-top: 5px; }

.section-block {
  background: #fafbfc;
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 18px;
  border: 1.5px solid #eef0f3;
}
.section-block h3 {
  font-size: 17px;
  color: var(--navy);
  margin-bottom: 14px;
  font-weight: 700;
}
.section-block.blue { background: #eef5fc; border-color: #d6e7f7; }
.section-block.green { background: #eef8f1; border-color: #cfe9d8; }
.section-block.yellow { background: #fff8e1; border-color: #ffe082; }
.section-block.red { background: #fdf0f0; border-color: #f5c8c4; }

.profile-selector {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin-top: 10px;
}
.profile-option {
  background: white;
  border: 2.5px solid var(--grey-line);
  border-radius: 12px;
  padding: 20px 14px;
  text-align: center;
  transition: all 0.15s;
  cursor: pointer;
}
.profile-option:hover { border-color: var(--navy); }
.profile-option.selected {
  border-color: var(--gold);
  background: #fff8e1;
}
.profile-option .pic { font-size: 40px; }
.profile-option .name { font-weight: 700; color: var(--navy); margin-top: 6px; font-size: 16px; }
.profile-option .desc { font-size: 13px; color: var(--grey-text); margin-top: 4px; }

/* ASSET ROWS */
.row-grid {
  display: grid;
  gap: 10px;
  margin-bottom: 10px;
  align-items: center;
}
.row-grid input, .row-grid select { padding: 10px 14px; border: 1.5px solid var(--grey-line); border-radius: 8px; font-size: 15px; }
.remove-btn {
  width: 38px; height: 38px;
  background: #fdf0f0;
  color: var(--red);
  border-radius: 8px;
  font-size: 20px;
  font-weight: 700;
  border: none;
  cursor: pointer;
}
.remove-btn:hover { background: var(--red); color: white; }
.add-btn {
  background: white;
  color: var(--navy);
  border: 2px dashed var(--grey-line);
  padding: 10px 18px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 500;
  width: 100%;
  margin-top: 6px;
}
.add-btn:hover { border-color: var(--navy); border-style: solid; background: #eef5fc; }
.use-checkbox {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  padding: 0 8px;
  white-space: nowrap;
}
.use-checkbox input { transform: scale(1.3); }

.insurance-group {
  background: white;
  border: 1.5px solid var(--grey-line);
  border-radius: 12px;
  padding: 18px;
  margin-bottom: 14px;
}
.insurance-group .ig-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.insurance-group h4 { font-size: 16px; color: var(--navy); font-weight: 700; }

/* PYRAMID */
.pyramid-wrap {
  background: linear-gradient(180deg, #f8fafc, #eef2f7);
  border-radius: 14px;
  padding: 30px 20px;
  margin: 18px 0;
  position: relative;
  transition: transform 0.2s;
}

@keyframes gentle-shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-3px) rotate(-0.3deg); }
  40% { transform: translateX(3px) rotate(0.3deg); }
  60% { transform: translateX(-2px) rotate(-0.2deg); }
  80% { transform: translateX(2px) rotate(0.2deg); }
}

@keyframes stable-pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.02); box-shadow: 0 0 30px rgba(39, 174, 96, 0.4); }
  100% { transform: scale(1); }
}

.pyramid-wrap.shake-unstable {
  animation: gentle-shake 1.4s ease-in-out infinite;
}

.pyramid-wrap.shake-stable {
  animation: stable-pulse 0.8s ease-out;
  border: 2px solid var(--green);
}
.pyramid-stars-top {
  text-align: center;
  font-size: 36px;
  height: 50px;
  letter-spacing: 6px;
  margin-bottom: 8px;
}
.pyramid-tier {
  position: relative;
  height: 110px;
  margin: 0 auto 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-wrap: wrap;
  gap: 8px;
  padding: 12px;
  border-radius: 12px;
  transition: all 0.3s;
}
.pyramid-tier.tier-top {
  width: 38%;
  background: linear-gradient(135deg, #ffe1a8, #ffd180);
  border: 3px solid var(--gold);
}
.pyramid-tier.tier-mid {
  width: 65%;
  background: linear-gradient(135deg, #d8d8d8, #c0c0c0);
  border: 3px solid #999;
}
.pyramid-tier.tier-base {
  width: 92%;
  background: linear-gradient(135deg, #aed6f1, #85c1e9);
  border: 3px solid var(--navy);
  min-height: 130px;
}
.pyramid-label {
  position: absolute;
  left: -110px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 16px;
  font-weight: 700;
  color: var(--navy);
  width: 100px;
  text-align: right;
}
.pyramid-label .sub {
  display: block;
  font-size: 12px;
  font-weight: 400;
  color: var(--grey-text);
  margin-top: 2px;
}
@media (max-width: 900px) {
  .pyramid-tier.tier-top { width: 55%; }
  .pyramid-tier.tier-mid { width: 80%; }
  .pyramid-label { display: none; }
}

.asset-bin {
  background: white;
  border: 2px dashed var(--grey-line);
  border-radius: 12px;
  padding: 16px;
  margin-top: 18px;
  min-height: 90px;
}
.asset-bin h4 { font-size: 14px; color: var(--grey-text); margin-bottom: 10px; }
.asset-chips { display: flex; flex-wrap: wrap; gap: 8px; }

.asset-chip {
  background: white;
  border: 2px solid var(--grey-line);
  border-radius: 9px;
  padding: 9px 14px;
  font-size: 14px;
  cursor: grab;
  user-select: none;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: all 0.15s;
  touch-action: none;
}
.asset-chip:hover { border-color: var(--navy); transform: translateY(-1px); }
.asset-chip.dragging { opacity: 0.5; cursor: grabbing; }
.asset-chip .val { color: var(--grey-text); font-size: 13px; font-weight: 600; }
.asset-chip.placed-top { background: #fff3cd; border-color: var(--gold); }
.asset-chip.placed-mid { background: #e9ecef; border-color: #888; }
.asset-chip.placed-base { background: #d4ebf2; border-color: var(--navy); }
.asset-chip.tier-explainer {
  background: white;
  border: 2px dashed rgba(13,31,60,0.4);
  font-style: italic;
  font-size: 13px;
  color: #555;
  cursor: default;
}

.pyramid-toolbar {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 14px;
  align-items: center;
}

/* PHASE 5 TIMELINE */
.timeline-wrap {
  margin: 24px 0;
  padding: 24px 16px;
  background: linear-gradient(180deg, #f8fafc, #eef2f7);
  border-radius: 14px;
  overflow-x: auto;
}
.timeline {
  display: grid;
  grid-template-columns: 1fr auto 1fr auto 1fr;
  gap: 0;
  align-items: center;
  min-width: 900px;
}
.timeline-checkpoint {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  position: relative;
}
.timeline-circle {
  width: 90px; height: 90px;
  border-radius: 50%;
  background: white;
  border: 3px solid var(--navy);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  font-weight: 700;
  color: var(--navy);
}
.timeline-circle .label { font-size: 12px; color: var(--grey-text); font-weight: 500; }
.timeline-bar {
  position: relative;
  height: 4px;
  background: var(--navy);
  min-width: 100px;
}
.timeline-bar .bar-label {
  position: absolute;
  top: -32px;
  left: 50%;
  transform: translateX(-50%);

<script>
/* ============================================================
   STORAGE — localStorage only (option A)
   ============================================================ */
const STORAGE_KEY = 'retirement_app_v5';
const SOUND_KEY = 'retirement_app_sound_v5';

function loadAll() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return { customers: [], activeId: null, version: 5 };
    return JSON.parse(raw);
  } catch (e) {
    console.error('Load error:', e);
    return { customers: [], activeId: null, version: 5 };
  }
}

function saveAll(data) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    return true;
  } catch (e) {
    showToast('บันทึกไม่สำเร็จ', 'error');
    return false;
  }
}

let APP = loadAll();

function saveAndRefresh() { saveAll(APP); }

/* ============================================================
   SOUND
   ============================================================ */
let soundEnabled = (localStorage.getItem(SOUND_KEY) || '1') === '1';
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { audioCtx = null; }
  }
  return audioCtx;
}

function playTone(freq, duration, type='sine', volume=0.15) {
  if (!soundEnabled) return;
  const ctx = getAudioCtx();
  if (!ctx) return;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(volume, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime + duration);
}

const SFX = {
  click: () => playTone(800, 0.05, 'sine', 0.08),
  drop: () => { playTone(400, 0.08); setTimeout(()=>playTone(600, 0.1), 50); },
  pop: () => playTone(900, 0.08, 'triangle', 0.12),
  star: () => { playTone(880, 0.1); setTimeout(()=>playTone(1320, 0.15), 80); },
  success: () => {
    playTone(523, 0.1); setTimeout(()=>playTone(659, 0.1), 100); setTimeout(()=>playTone(784, 0.2), 200);
  },
  remove: () => playTone(300, 0.1, 'sine', 0.08),
};

function toggleSound() {
  soundEnabled = !soundEnabled;
  localStorage.setItem(SOUND_KEY, soundEnabled ? '1' : '0');
  document.getElementById('soundBtn').textContent = soundEnabled ? '🔊' : '🔇';
  if (soundEnabled) SFX.click();
}

/* ============================================================
   TOAST + MODAL
   ============================================================ */
function showToast(msg, type='') {
  const root = document.getElementById('toastRoot');
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  root.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; }, 2000);
  setTimeout(() => t.remove(), 2500);
}

function confirmModal(title, body, onConfirm, confirmText='ยืนยัน') {
  const root = document.getElementById('modalRoot');
  root.innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h3>${title}</h3>
        <p>${body}</p>
        <div class="actions">
          <button class="btn-secondary" onclick="closeModal()">ยกเลิก</button>
          <button class="btn-primary" onclick="window._modalOk()">${confirmText}</button>
        </div>
      </div>
    </div>`;
  window._modalOk = () => { onConfirm(); closeModal(); };
}

function closeModal() { document.getElementById('modalRoot').innerHTML = ''; }

/* ============================================================
   CUSTOMER MODEL
   ============================================================ */
function newCustomer() {
  return {
    id: 'c_' + Date.now() + '_' + Math.floor(Math.random()*1000),
    createdAt: Date.now(),
    updatedAt: Date.now(),
    currentPhase: 1,
    phasesDone: [],
    status: 'in_progress',
    nextAppointment: '',
    profile: {
      name: '', nickname: '', dob: '', gender: '', phone: '', email: '', line: '',
      occupation: '', province: '', profileType: ''
    },
    finance: {
      monthlyIncome: 0, monthlyExpense: 0,
      debtHouse: 0, debtCar: 0, debtCard: 0, debtOther: 0,
      childCount: 0, childAges: '', parentDependents: '',
      painPoints: ''
    },
    assets: [],
    cashFlows: [],
    insurance: { life: [], health: [], critical: [], pension: [] },
    pyramidBefore: {},
    goal: {
      currentAge: 0, retireAge: 60, lifeExpectancy: 90,
      annualExpense: 0,
      cashFlowAnnual: 0,
      cashFlowPulled: false,
      assetsPulled: false,
      assetsAmount: 0,
      returnRate: 7
    },
    plan: {
      // Combined phase 6+7
      protectionPct: null,  // 30/50/75/100
      protectionMode: '',   // 'auto' | 'manual'
      sumInsured: 0,
      premium: 0,
      product: '',
      payYears: 0,
      adjustReturnRate: 7,
      adjustRetireAge: 60,
      hasExistingCover: false
    },
    summary: {
      chosenPath: null,  // A | B
      slidersUsed: { retireAge: 60, returnRate: 7, protectionPct: 0 }
    }
  };
}

function getActive() {
  if (!APP.activeId) return null;
  return APP.customers.find(c => c.id === APP.activeId);
}

/* ============================================================
   NUMBER FORMATTERS — all use commas
   ============================================================ */
function fmt(n) {
  if (n === null || n === undefined || isNaN(n)) return '0';
  return Math.round(n).toLocaleString('en-US');
}

function fmtDecimal(n, decimals=2) {
  if (n === null || n === undefined || isNaN(n)) return '0.00';
  return n.toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
}

function fmtAge(dob) {
  if (!dob) return '-';
  const d = new Date(dob);
  if (isNaN(d)) return '-';
  return Math.floor((Date.now() - d.getTime()) / (365.25 * 24 * 3600 * 1000));
}

function statusLabel(s) {
  return {
    in_progress: '🟢 กำลังคุย',
    hot: '🟡 Hot Lead',
    won: '✅ ปิดได้',
    lost: '❌ ไม่ปิด',
    paused: '⏸️ พัก'
  }[s] || s;
}

function profileTypeLabel(t) {
  return { family: '👨‍👩‍👧 Family', couple: '👫 มีแฟน', single: '🧑 Single' }[t] || '-';
}

/* ============================================================
   CALCULATIONS
   ============================================================ */
function calcAnnualCashFlow(c) {
  return (c.cashFlows||[]).filter(cf => cf.useForRetirement).reduce((s, cf) => s + (Number(cf.monthly)||0)*12, 0);
}

function calcAssetsForRetirement(c) {
  return (c.assets||[]).filter(a => a.useForRetirement).reduce((s, a) => s + (Number(a.value)||0), 0);
}

function calcRetirement(c) {
  const g = c.goal || {};
  const yearsToRetire = Math.max(1, (g.retireAge||60) - (g.currentAge||30));
  const yearsRetired = Math.max(1, (g.lifeExpectancy||90) - (g.retireAge||60));
  const annualExpenseToday = g.annualExpense || 0;
  const inflationRate = 0.03;  // locked at 3%
  const withdrawalRate = 0.04; // locked at 4%
  const returnRate = (g.returnRate || 7) / 100;
  
  // Step 1: รายจ่ายตอนเกษียณ (เงินเฟ้อแล้ว)
  const inflatedAnnual = annualExpenseToday * Math.pow(1 + inflationRate, yearsToRetire);
  
  // Step 2: หัก cash flow (ถ้าดึงข้อมูลแล้ว)
  const cashFlowAnnual = g.cashFlowPulled ? (g.cashFlowAnnual || 0) : 0;
  const netAnnualNeeded = Math.max(0, inflatedAnnual - cashFlowAnnual);
  
  // Step 3: เป้ากองทุนเกษียณ
  const requiredCorpus = netAnnualNeeded / withdrawalRate;
  
  // Step 4: สินทรัพย์ที่เตรียมไว้แล้ว (ดึงแล้วเท่านั้น)
  const assetsAmount = g.assetsPulled ? (g.assetsAmount || 0) : 0;
  // Future value ของสินทรัพย์ที่มี
  const fvOfAssets = assetsAmount * Math.pow(1 + returnRate, yearsToRetire);
  const gap = Math.max(0, requiredCorpus - fvOfAssets);
  
  // Step 5: PMT - เงินที่ต้องเก็บเพิ่มต่อปี
  const compoundFactor = returnRate > 0 ? (Math.pow(1 + returnRate, yearsToRetire) - 1) / returnRate : yearsToRetire;
  const annualPMT = compoundFactor > 0 ? gap / compoundFactor : 0;
  
  return {
    yearsToRetire, yearsRetired,
    annualExpenseToday, inflatedAnnual,
    cashFlowAnnual, netAnnualNeeded,
    requiredCorpus,
    assetsAmount, fvOfAssets,
    gap, annualPMT
  };
}

/* ============================================================
   PREMIUM TABLE — Calibrated to real AIA data
   Anchor: ชาย 45 -> 35,850 บาท ต่อล้านบาททุน
   ============================================================ */
const RATE_PER_MILLION = {
  20: 12575, 21: 12740, 22: 12907, 23: 13074, 24: 13237,
  25: 13405, 26: 13571, 27: 13737, 28: 13903, 29: 14068,
  30: 14233, 31: 14464, 32: 14695, 33: 14927, 34: 15159,
  35: 15390, 36: 15689, 37: 15987, 38: 16285, 39: 16583,
  40: 16881, 41: 17277, 42: 17672, 43: 18067, 44: 18462,
  // Real anchor data from Tis (ชาย 45 = 35,850)
  // We back-fit: scale 18857 -> 35850 means scale 1.901
  // Actually let me recompute: keep ages 20-44 as before, but recalibrate from 45 up
  // Using observed: 45 -> 35,850 (single source of truth)
  45: 35850,
  46: 36850, 47: 37857, 48: 38863, 49: 39870,
  50: 40882, 51: 42139, 52: 43396, 53: 44653, 54: 45910,
  55: 47171, 56: 48740, 57: 50314, 58: 51887, 59: 53461,
  60: 55033, 61: 56918, 62: 58804, 63: 60690, 64: 62576,
  65: 64461, 66: 66662, 67: 68863, 68: 71064, 69: 73265, 70: 75466
};

// Actually, let me rebuild a smoother table using the anchor
// Since the test data shows ratio = 35,850/M at age 45 and is constant per cover (good!)
// I'll use a smooth scaling based on the original PAY20 curve
function getRatePerMillion(age) {
  const a = Math.round(Math.max(20, Math.min(70, age)));
  // The table above has a discontinuity at 45 (jumps from 18,462 to 35,850)
  // Use proper interpolation
  if (RATE_PER_MILLION[a]) return RATE_PER_MILLION[a];
  return 35850; // fallback
}

function calcPremium(age, coverBaht) {
  if (!coverBaht || coverBaht <= 0) return 0;
  const ratePerM = getRatePerMillion(age);
  return Math.round(ratePerM * coverBaht / 1000000);
}

/* ============================================================
   ROUTING
   ============================================================ */
let currentView = 'dashboard';
let currentPhase = 1;
let currentFilter = 'all';
let searchQuery = '';

function goToDashboard() {
  currentView = 'dashboard';
  APP.activeId = null;
  saveAndRefresh();
  render();
}

function openCustomer(id) {
  APP.activeId = id;
  currentView = 'customer';
  const c = getActive();
  currentPhase = c.currentPhase || 1;
  saveAndRefresh();
  render();
  SFX.click();
}

function goToPhase(n) {
  currentPhase = n;
  const c = getActive();
  if (c) {
    c.currentPhase = n;
    saveAndRefresh();
  }
  render();
  SFX.click();
}

function nextPhase() {
  const c = getActive();
  if (!c) return;
  if (!c.phasesDone.includes(currentPhase)) c.phasesDone.push(currentPhase);
  if (currentPhase < 7) goToPhase(currentPhase + 1);
  else { showToast('ทำครบทุกขั้นตอนแล้ว!', 'success'); SFX.success(); }
}

function prevPhase() { if (currentPhase > 1) goToPhase(currentPhase - 1); }

function render() {
  const app = document.getElementById('app');
  
  // Preserve focus on inputs marked with data-preserve-focus
  const activeEl = document.activeElement;
  let focusInfo = null;
  if (activeEl && activeEl.tagName === 'INPUT' && activeEl.hasAttribute('data-preserve-focus')) {
    focusInfo = {
      key: activeEl.getAttribute('data-preserve-focus'),
      selStart: activeEl.selectionStart,
      selEnd: activeEl.selectionEnd
    };
  }
  
  if (currentView === 'dashboard') {
    app.innerHTML = renderDashboard();
  } else {
    const c = getActive();
    if (!c) { goToDashboard(); return; }
    app.innerHTML = renderCustomerView(c);
    setTimeout(() => initPhaseInteractions(), 50);
  }
  
  // Restore focus
  if (focusInfo) {
    const el = document.querySelector(`[data-preserve-focus="${focusInfo.key}"]`);
    if (el) {
      el.focus();
      try { el.setSelectionRange(focusInfo.selStart, focusInfo.selEnd); } catch(e) {}
    }
  }
}

/* ============================================================
   FIELD HELPERS
   ============================================================ */
function bindField(path) {
  return `oninput="updateField('${path}', this.value)"`;
}

function bindNumber(path) {
  return `oninput="updateField('${path}', Number(this.value)||0)"`;
}

function updateField(path, value) {
  const c = getActive();
  if (!c) return;
  const parts = path.split('.');
  let target = c;
  for (let i = 0; i < parts.length - 1; i++) {
    if (!target[parts[i]]) target[parts[i]] = {};
    target = target[parts[i]];
  }
  target[parts[parts.length-1]] = value;
  c.updatedAt = Date.now();
  saveAndRefresh();
}

function getFilteredCustomers() {
  const customers = APP.customers || [];
  return customers.filter(c => {
    if (currentFilter !== 'all' && c.status !== currentFilter) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      const blob = ((c.profile.name||'') + ' ' + (c.profile.nickname||'') + ' ' +
                    (c.profile.phone||'') + ' ' + (c.profile.line||'') + ' ' +
                    (c.profile.occupation||'')).toLowerCase();
      if (!blob.includes(q)) return false;
    }
    return true;
  }).sort((a,b) => (b.updatedAt||0) - (a.updatedAt||0));
}

function refreshCustomerList() {
  const container = document.getElementById('customerListContainer');
  if (!container) return;
  const filtered = getFilteredCustomers();
  const totalCustomers = (APP.customers||[]).length;
  container.innerHTML = filtered.length === 0 
    ? renderEmptyState(totalCustomers === 0)
    : `<div class="customer-grid">${filtered.map(c => renderCustomerCard(c)).join('')}</div>`;
  
  // Also refresh filter pills active state
  document.querySelectorAll('.filter-pill[data-filter]').forEach(pill => {
    const f = pill.getAttribute('data-filter');
    pill.classList.toggle('active', f === currentFilter);
  });
}

function statusShortLabel(s) {
  return {
    in_progress: '🟢 คุย',

function setCustomerStatus(id, status) {
  const c = APP.customers.find(x => x.id === id);

  c.status = status;

  refreshCustomerList();

  const statsEl = document.querySelector('.stats-grid');
  if (statsEl && currentView === 'dashboard') render();
  SFX.click();
}

function setFilter(f) { currentFilter = f; refreshCustomerList(); }
function updateSearch(q) { searchQuery = q; refreshCustomerList(); }

function createNewCustomer() {
  const c = newCustomer();
  APP.customers.push(c);
  APP.activeId = c.id;
  saveAndRefresh();
  currentView = 'customer';
  currentPhase = 1;
  render();
  SFX.success();
  showToast('เพิ่มลูกค้าใหม่แล้ว', 'success');
}

function deleteCustomer(id) {
  const c = APP.customers.find(x => x.id === id);
  if (!c) return;
  confirmModal('ลบลูกค้า?',
    `ลบ "${c.profile.name || 'ลูกค้านี้'}"? การลบไม่สามารถย้อนกลับได้`,
    () => {
      APP.customers = APP.customers.filter(x => x.id !== id);
      saveAndRefresh(); render();
      SFX.remove(); showToast('ลบเรียบร้อย');
    }, 'ลบเลย');
}

function duplicateCustomer(id) {
  const c = APP.customers.find(x => x.id === id);
  if (!c) return;
  const copy = JSON.parse(JSON.stringify(c));
  copy.id = 'c_' + Date.now() + '_' + Math.floor(Math.random()*1000);
  copy.createdAt = Date.now();
  copy.updatedAt = Date.now();
  copy.profile.name = (copy.profile.name || 'ลูกค้า') + ' (สำเนา)';
  APP.customers.push(copy);
  saveAndRefresh(); render();
  showToast('คัดลอกแล้ว', 'success');
}

function exportAllJSON() {
  const data = JSON.stringify(APP, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `retirement_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Backup สำเร็จ', 'success');
}

function importAllJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.customers || !Array.isArray(data.customers)) {
        showToast('ไฟล์ไม่ถูกต้อง', 'error'); return;
      }
      confirmModal('นำเข้าข้อมูล?',
        `พบ ${data.customers.length} ลูกค้า — จะเขียนทับข้อมูลเดิม`,
        () => { APP = data; saveAndRefresh(); render(); showToast('นำเข้าสำเร็จ', 'success'); },
        'นำเข้า');
    } catch (e) { showToast('ไฟล์เสียหาย', 'error'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function exportCustomerJSON(id) {
  const c = APP.customers.find(x => x.id === id);
  if (!c) return;
  const data = JSON.stringify(c, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `customer_${c.profile.name||'unknown'}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Export สำเร็จ', 'success');
}

function renderCustomerBanner(c) {

function renderPhaseNav(c) {
  const titles = ['ลงทะเบียน','การเงิน','สินทรัพย์','Pyramid','Timeline','แผน','สรุป'];
  const items = titles.map((t,i) => {
    const n = i+1;
    const cls = (n === currentPhase ? 'active ' : '') + (c.phasesDone.includes(n) ? 'done ' : '');
    return `<button class="phase-nav-item ${cls}" onclick="goToPhase(${n})">
      <span class="num">${n}</span>${t}</button>`;
  }).join('');
  return `<div class="phase-nav">${items}</div>`;
}

function renderPhase(c, n) {
  switch(n) {
    case 1: return renderPhase1(c);
    case 2: return renderPhase2(c);
    case 3: return renderPhase3(c);
    case 4: return renderPhase4(c);
    case 5: return renderPhase5(c);
    case 6: return renderPhase6(c);
    case 7: return renderPhase7(c);
    default: return '<p>Phase not found</p>';
  }
}

  return `

}

  return `

function collectAllAssetItems(c) {
  const items = [];
  (c.assets||[]).forEach(a => {
    items.push({
      id: a.id,
      kind: 'asset',
      label: a.name || '(ไม่ระบุ)',
      val: a.value ? `${fmt(a.value)} ฿` : ''
    });
  });
  ['life','health','critical','pension'].forEach(type => {
    (c.insurance?.[type] || []).forEach((ins, i) => {
      const id = `ins_${type}_${i}`;
      const icons = { life: '🛡️', health: '🏥', critical: '⚕️', pension: '👴' };
      const labels = { life: 'ประกันชีวิต', health: 'ประกันสุขภาพ', critical: 'โรคร้าย', pension: 'บำนาญ' };
      items.push({
        id,
        kind: 'insurance',
        label: `${icons[type]} ${ins.company || labels[type]}`,
        val: ins.sumInsured ? `ทุน ${fmt(ins.sumInsured)} ฿` : (ins.premium ? `${fmt(ins.premium)} ฿/ปี` : '')
      });
    });
  });
  return items;
}

function renderTierContent(c, tier, showExplainers) {
  const placed = c.pyramidBefore || {};
  const allItems = collectAllAssetItems(c);
  const explainers = showExplainers ? TIER_EXPLAINERS.filter(e => e.tier === tier) : [];
  
  const items = [];
  
  // Real items placed in this tier
  allItems.forEach(item => {
    if (placed[item.id] === tier) {
      items.push(`<div class="asset-chip placed-${tier}" data-asset-id="${item.id}" draggable="true">
        ${item.label}${item.val ? ` <span class="val">${item.val}</span>` : ''}
      </div>`);
    }
  });
  
  // Explainer chips (not draggable)
  explainers.forEach(e => {
    items.push(`<div class="asset-chip tier-explainer">${e.text}</div>`);
  });
  
  return items.join('');
}

function renderAssetChipHTML(item) {
  return `<div class="asset-chip" data-asset-id="${item.id}" draggable="true">
    ${item.label}${item.val ? ` <span class="val">${item.val}</span>` : ''}
  </div>`;
}

function renderPyramidStars(c) {
  const placed = c.pyramidBefore || {};
  const placedCount = Object.keys(placed).length;
  if (placedCount === 0) return '<span class="text-grey small">ลากสินทรัพย์ลงไปวาง</span>';
  
  const baseCount = Object.values(placed).filter(t => t === 'base').length;
  const insBase = ['life','health','critical','pension'].some(type => 
    (c.insurance?.[type] || []).some((_, i) => placed[`ins_${type}_${i}`] === 'base'));
  
  let score = 0;
  if (baseCount >= 1) score++;
  if (baseCount >= 2) score++;
  if (insBase) score++;
  if (baseCount >= 3) score++;
  if (baseCount >= 4) score++;
  
  return '⭐'.repeat(score) + '☆'.repeat(5-score);
}

function togglePyramidExplainers() {
  const c = getActive();
  c.pyramidExplainersVisible = c.pyramidExplainersVisible === false;
  saveAndRefresh();
  render();
  SFX.click();
}

function clearPyramid() {
  const c = getActive();
  c.pyramidBefore = {};
  saveAndRefresh();
  render();
  SFX.remove();
  showToast('เคลียร์สินทรัพย์ทั้งหมดแล้ว');

function checkStability() {
  const c = getActive();
  const placed = c.pyramidBefore || {};
  const placedCount = Object.keys(placed).length;
  
  // Analysis: ฐานต้องมีอะไรบ้าง?
  const inBase = Object.entries(placed).filter(([_, t]) => t === 'base').map(([id]) => id);
  const inMid = Object.entries(placed).filter(([_, t]) => t === 'mid').map(([id]) => id);
  const inTop = Object.entries(placed).filter(([_, t]) => t === 'top').map(([id]) => id);
  
  // Check what's at base
  const hasEmergencyFund = (c.assets||[]).some(a => 
    placed[a.id] === 'base' && /ฉุกเฉิน|สำรอง|deposit|ฝาก|เงินสด|cash/i.test(a.name||''));
  
  const insuranceTypes = ['life', 'health', 'critical', 'pension'];
  const insuranceAtBase = {};
  insuranceTypes.forEach(type => {
    insuranceAtBase[type] = (c.insurance?.[type]||[]).some((_, i) => 
      placed[`ins_${type}_${i}`] === 'base');
  });
  
  const hasHealth = insuranceAtBase.health;
  const hasLife = insuranceAtBase.life;
  const hasCritical = insuranceAtBase.critical;
  
  // Score
  const checks = [
    { ok: hasEmergencyFund, label: 'เงินสำรองฉุกเฉินอยู่ฐาน', tip: 'แนะนำเงินฝาก/cash 6 เดือนของรายจ่าย' },
    { ok: hasHealth, label: 'ประกันสุขภาพอยู่ฐาน', tip: 'ป้องกันค่ารักษาพยาบาลที่อาจมาแบบไม่ทันตั้งตัว' },
    { ok: hasLife, label: 'ประกันชีวิตอยู่ฐาน', tip: 'ปกป้องครอบครัวและภาระทางการเงิน' },
    { ok: hasCritical, label: 'ประกันโรคร้ายอยู่ฐาน', tip: 'ป้องกันค่าใช้จ่ายโรคร้ายที่เกินประกันสุขภาพ' },
    { ok: inBase.length >= 3, label: 'มีสินทรัพย์ฐานอย่างน้อย 3 รายการ', tip: 'กระจายความเสี่ยงในชั้นฐาน' }
  ];
  
  const passed = checks.filter(ch => ch.ok).length;
  const stable = passed >= 4;
  
  // Render result
  const resultEl = document.getElementById('stabilityResult');
  const pyramidEl = document.getElementById('pyramidWrap');
  
  if (resultEl) {
    resultEl.classList.remove('hidden');
    resultEl.innerHTML = `
      <div class="section-block ${stable ? 'green' : 'red'}" style="margin-top: 16px;">
        <h3 style="display:flex; align-items:center; gap:10px">
          ${stable ? '✅ ฐานแน่น มั่นคง 5 ดาว' : '⚠️ ฐานยังไม่แน่น ต้องเสริมเพิ่ม'}
          <span style="font-size:14px; color:var(--grey-text); font-weight:500">(${passed}/${checks.length})</span>
        </h3>
        <div style="margin-top:12px">
          ${checks.map(ch => `
            <div style="display:flex; align-items:flex-start; gap:8px; padding:6px 0; font-size:14px">
              <span style="font-size:18px">${ch.ok ? '✅' : '⚠️'}</span>
              <div>
                <div style="font-weight:600; color:${ch.ok ? 'var(--green-dark)' : 'var(--red)'}">${ch.label}</div>
                ${!ch.ok ? `<div style="color:var(--grey-text); font-size:13px">${ch.tip}</div>` : ''}
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
    resultEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
  
  // Trigger shake if not stable, fix-pulse if stable
  if (pyramidEl) {
    pyramidEl.classList.remove('shake-stable', 'shake-unstable');
    void pyramidEl.offsetWidth; // force reflow
    if (stable) {
      pyramidEl.classList.add('shake-stable');
      SFX.success();
    } else {
      pyramidEl.classList.add('shake-unstable');
      SFX.remove();
    }
  }
}

function pullCashFlowData() {
  const c = getActive();
  const cfAnnual = calcAnnualCashFlow(c);
  // Inflate cash flow to retirement year
  const yearsToRetire = (c.goal.retireAge||60) - (c.goal.currentAge||30);
  const inflated = cfAnnual * Math.pow(1.03, yearsToRetire);
  c.goal.cashFlowAnnual = Math.round(inflated);
  c.goal.cashFlowPulled = true;
  saveAndRefresh();
  render();
  SFX.success();
  showToast('ดึงกระแสเงินสดสำเร็จ', 'success');
}

function pullAssetsData() {
  const c = getActive();
  c.goal.assetsAmount = calcAssetsForRetirement(c);
  c.goal.assetsPulled = true;
  saveAndRefresh();
  render();
  SFX.success();
  showToast('ดึงสินทรัพย์สำเร็จ', 'success');
}

function resetPullData() {
  const c = getActive();
  c.goal.cashFlowPulled = false;
  c.goal.assetsPulled = false;
  saveAndRefresh();
  render();
  SFX.remove();
}

/* ============================================================
   PHASE 6 — COMBINED PROTECTION + GAME (v6)
   ============================================================ */
function renderPhase6(c) {
  const g = c.goal || {};
  const m = calcRetirement(c);
  const p = c.plan || {};
  const f = c.finance || {};
  const age = fmtAge(c.profile.dob) || g.currentAge || 35;
  
  const existingCover = [
    ...((c.insurance && c.insurance.life)||[]),
    ...((c.insurance && c.insurance.critical)||[]),
    ...((c.insurance && c.insurance.pension)||[])
  ].reduce((s, ins) => s + (Number(ins.sumInsured)||0), 0);
  
  const protectionMode = p.protectionMode || 'retirement';
  
  const targetRetirement = m.requiredCorpus;
  // Mode B: ปกป้องรายได้/มรดก — auto-suggest หรือใส่เองอิสระ
  const totalDebt = (f.debtHouse||0)*12*15 + (f.debtCar||0)*12*5 + 
                    (f.debtCard||0)*12*2 + (f.debtOther||0)*12*5;
  const yearsToSupport = 20;
  const annualIncome = (f.monthlyIncome||0) * 12;
  const targetIncomeAuto = totalDebt + annualIncome * yearsToSupport;
  // Free-input override (เช่น ลูกค้าบอก 5 ล้านพอ)
  const customTarget = p.protectionCustomTarget;
  const targetIncome = (customTarget !== undefined && customTarget !== null) 
    ? Number(customTarget) 
    : targetIncomeAuto;
  
  const protectionTarget = protectionMode === 'income' ? targetIncome : targetRetirement;
  const gapToProtect = Math.max(0, protectionTarget - existingCover);
  const coverPctOfTarget = protectionTarget > 0 ? (existingCover / protectionTarget * 100) : 0;
  const protectionFull = coverPctOfTarget >= 100;
  
  const targetPct = p.protectionPct || 0;
  const targetCover = gapToProtect * targetPct / 100;
  const newPremiumWL = calcPremium(age, targetCover);
  
  if (targetPct > 0) {
    p.sumInsured = targetCover;
    p.premium = newPremiumWL;
    p.product = 'Whole Life';
  } else {
    p.sumInsured = 0;
    p.premium = 0;
  }
  
  // === FUND GAME — LOCK CORPUS, adjust retire age ===
  const lockedCorpus = m.requiredCorpus;
  const lockedGap = m.gap;
  const baselinePMT = m.annualPMT;
  
  const adjReturnRate = p.adjustReturnRate || g.returnRate || 7;
  const adjPMT = p.adjustPMT || baselinePMT;
  
  let neededYears;
  if (adjPMT > 0 && adjReturnRate > 0 && lockedGap > 0) {
    const r = adjReturnRate / 100;
    neededYears = Math.log(1 + lockedGap * r / adjPMT) / Math.log(1 + r);
  } else if (adjPMT > 0 && lockedGap > 0) {
    neededYears = lockedGap / adjPMT;
  } else {
    neededYears = 0;
  }
  const newRetireAge = Math.ceil((g.currentAge||30) + neededYears);
  const ageDelta = newRetireAge - (g.retireAge||60);
  
  const fundIndicator = lockedGap === 0 ? 'full' : (newRetireAge <= (g.retireAge||60) + 2 ? 'partial' : 'empty');
  const protectionIndicator = protectionFull ? 'full' : (targetPct > 0 ? 'partial' : 'empty');
  
  return `
    <div class="phase-header">
      <span class="phase-badge" style="background:var(--green)">PHASE 6</span>
      <h2>เลือกแผน — กองทุน + ปกป้อง</h2>
    </div>
    
    <div class="combined-grid">
      <div class="target-card fund">
        <h3>
          <span>💰 กองทุนเกษียณ</span>
          <span class="indicator ${fundIndicator}">
            ${fundIndicator==='full' ? '✓ พร้อม' : fundIndicator==='partial' ? '⚡ ใกล้เคียง' : '⚠ ช้ากว่าเป้า'}
          </span>
        </h3>
        
        <div class="info-strip" style="background:#fff8e1;border-left-color:var(--gold);color:#5d4f00">
          🔒 เป้ากองทุน <b>${fmt(lockedCorpus)}</b> บาท · ขาดอีก <b>${fmt(lockedGap)}</b> บาท
        </div>
        
        <div class="big-num">${fmt(adjPMT)}</div>
        <div class="sub-num">บาท/ปี ที่จะเก็บ (เดิม ${fmt(baselinePMT)})</div>
        
        <div class="info-strip mt-16" style="background:${ageDelta>0?'#fdf0f0':'#eef8f1'};border-left-color:${ageDelta>0?'var(--red)':'var(--green)'};color:${ageDelta>0?'var(--red)':'var(--green-dark)'}">
          📅 จะเกษียณตอนอายุ <b>${newRetireAge}</b> ปี 
          ${ageDelta>0 ? `(ช้ากว่าเดิม ${ageDelta} ปี)` : ageDelta<0 ? `(เร็วกว่าเดิม ${-ageDelta} ปี!)` : '(ตรงเป้าเดิม)'}
        </div>
        
        <div class="section-block" style="margin-top:14px; background:white">
          <div class="adjust-row">
            <label>ผลตอบแทน</label>
            <input type="range" min="5" max="12" step="0.5" value="${adjReturnRate}" 
                   oninput="setAdjReturnRate(this.value)">
            <span class="value-display">${adjReturnRate}%</span>
          </div>
          <div class="adjust-row">
            <label>เก็บเงิน/ปี</label>
            <input type="range" 
                   min="${Math.max(10000, Math.round(baselinePMT*0.3/10000)*10000)}" 
                   max="${Math.round(baselinePMT*2/10000)*10000}" 
                   step="10000" value="${adjPMT}" 
                   oninput="setAdjPMT(this.value)">
            <span class="value-display">${fmt(adjPMT)}</span>
          </div>
          <button class="btn-secondary" style="font-size:13px; padding:6px 12px; margin-top:6px" onclick="resetFundAdjust()">↺ รีเซ็ต</button>
        </div>
      </div>
      
      <div class="target-card protection">
        <h3>
          <span>🛡️ ปกป้อง</span>
          <span class="indicator ${protectionIndicator}">
            ${protectionIndicator==='full' ? '✓ ครอบคลุมแล้ว' : protectionIndicator==='partial' ? '⚡ เลือกแล้ว' : '⚠ ยังไม่เลือก'}
          </span>
        </h3>
        
        <div class="flex-row" style="gap:6px; margin-bottom:14px; background:#f5f6f8; padding:4px; border-radius:10px">
          <button class="${protectionMode==='retirement'?'btn-action':'btn-secondary'}" 
                  style="flex:1; font-size:14px; padding:10px"
                  onclick="setProtectionMode('retirement')">🎯 ปกป้องแผนเกษียณ</button>
          <button class="${protectionMode==='income'?'btn-action':'btn-secondary'}" 
                  style="flex:1; font-size:14px; padding:10px"
                  onclick="setProtectionMode('income')">👨‍👩‍👧 ปกป้องรายได้/มรดก</button>
        </div>
        
        ${protectionMode==='income' ? `
          <div class="form-field" style="margin-bottom:10px">
            <label style="font-size:14px; color:var(--navy); font-weight:700">เป้าปกป้อง / มรดก (บาท)</label>
            <input type="number" value="${protectionTarget}" 
                   oninput="setProtectionCustomTarget(this.value)"
                   data-preserve-focus="protectionCustomTarget"
                   style="font-size:18px; font-weight:600; padding:14px 16px"
                   placeholder="ใส่ตัวเลขที่ต้องการ">
            <span class="helper">
              💡 แนะนำ: หนี้รวม ${fmt(totalDebt)} + รายได้ ${fmt(annualIncome)}/ปี × ${yearsToSupport} ปี = <b>${fmt(targetIncomeAuto)}</b> บาท
              ${customTarget !== undefined && customTarget !== null ? ` · <a href="#" onclick="event.preventDefault(); setProtectionCustomTarget(null)">↺ ใช้แนะนำ</a>` : ''}
            </span>
          </div>
        ` : `
          <div class="info-strip" style="background:#fff8e1;border-left-color:var(--gold)">
            เป้าปกป้อง: <b>${fmt(protectionTarget)}</b> บาท
          </div>
        `}
        
        ${existingCover > 0 ? `
          <div class="info-strip mt-8">
            มีประกันอยู่แล้ว: <b>${fmt(existingCover)}</b> บาท 
            (${fmtDecimal(coverPctOfTarget, 1)}% ของเป้า)
          </div>` : ''}
        
        ${protectionFull ? `
          <div class="big-num text-green">100%</div>
          <div class="sub-num">ปกป้องครบแล้ว ไม่ต้องซื้อเพิ่ม</div>
          <div class="fill-bar"><div class="fill-bar-inner full" style="width: 100%">ครอบคลุม</div></div>
        ` : `
          <p class="text-grey small mb-8">เลือก % ของส่วนที่ต้องเตรียมเพิ่ม (กดซ้ำ = ยกเลิก):</p>
          <div class="protection-grid">
            ${[100, 75, 50, 30].map(pct => {
              const cover = gapToProtect * pct / 100;
              const premium = calcPremium(age, cover);
              return `
                <div class="protection-card ${targetPct===pct?'selected':''}" onclick="selectProtectionPct(${pct})">
                  <div class="pct">${pct}%</div>
                  <div class="calc">
                    <div class="row"><span>ทุนเพิ่ม</span><b>${fmt(cover)}</b></div>
                    <div class="row"><span>เบี้ย/ปี</span><b style="color:var(--red)">${fmt(premium)}</b></div>
                  </div>
                </div>`;
            }).join('')}
          </div>
          ${targetPct > 0 ? `
            <div class="fill-bar mt-16">
              <div class="fill-bar-inner partial" style="width: ${targetPct}%">${targetPct}%</div>
            </div>
            <div class="text-grey small mt-8 center">
              ทุนเพิ่ม <b class="text-navy">${fmt(targetCover)}</b> บาท · 
              เบี้ยใหม่ <b class="text-red">${fmt(newPremiumWL)}</b> บาท/ปี
            </div>
          ` : ''}
        `}
      </div>
    </div>
    
    ${renderPhaseFooter()}`;
}

function selectProtectionPct(pct) {
  const c = getActive();
  if (c.plan.protectionPct === pct) {
    c.plan.protectionPct = 0;
    c.plan.sumInsured = 0;
    c.plan.premium = 0;
    SFX.remove();
  } else {
    c.plan.protectionPct = pct;
    SFX.success();
  }
  saveAndRefresh();
  render();
}

function setProtectionMode(mode) {
  const c = getActive();
  c.plan.protectionMode = mode;
  c.plan.protectionPct = 0;
  saveAndRefresh();
  render();
  SFX.click();
}

function setProtectionCustomTarget(val) {
  const c = getActive();
  if (val === null || val === '' || val === undefined) {
    delete c.plan.protectionCustomTarget;
  } else {
    c.plan.protectionCustomTarget = Number(val) || 0;
  }
  c.plan.protectionPct = 0; // reset selection when target changes
  saveAndRefresh();
  render();
}

function setAdjReturnRate(val) {
  const c = getActive();
  c.plan.adjustReturnRate = Number(val);
  saveAndRefresh();
  render();
}

function setAdjPMT(val) {
  const c = getActive();
  c.plan.adjustPMT = Number(val);
  saveAndRefresh();
  render();
}

function resetFundAdjust() {
  const c = getActive();
  const m = calcRetirement(c);
  c.plan.adjustReturnRate = c.goal.returnRate || 7;
  c.plan.adjustPMT = m.annualPMT;
  saveAndRefresh();
  render();
  SFX.click();
}

/* ============================================================
   PHASE 7 — SUMMARY (combined former 8+9, no health, no status)
   ============================================================ */
function renderPhase7(c) {
  const g = c.goal || {};
  const m = calcRetirement(c);
  const p = c.plan || {};
  
  // Path A: ค่าเดิมจาก Phase 5 (เก็บเต็มเป้าตามเดิม)
  const corpusA = m.requiredCorpus;
  const pmtA = m.annualPMT;
  const ageA = g.retireAge || 60;
  const returnA = g.returnRate || 7;
  
  // Path B: ปรับเงื่อนไข (ใช้ adjPMT + adjReturnRate จาก Phase 6)
  const adjReturnRate = p.adjustReturnRate || g.returnRate || 7;
  const pmtB = p.adjustPMT || pmtA;
  const corpusB = m.requiredCorpus; // LOCKED — เป้าเดิม
  const gapB = m.gap;
  let ageB = ageA;
  if (pmtB > 0 && adjReturnRate > 0 && gapB > 0) {
    const r = adjReturnRate / 100;
    const neededYrs = Math.log(1 + gapB * r / pmtB) / Math.log(1 + r);
    ageB = Math.ceil((g.currentAge||30) + neededYrs);
  }
  
  const chosen = c.summary?.chosenPath;
  
  return `
    <div class="phase-header">
      <span class="phase-badge" style="background:var(--grey-text)">PHASE 7</span>
      <h2>สรุปแผน</h2>
    </div>
    
    <div class="info-strip gold">
      <b>เลือกทาง:</b> A เก็บเต็มเป้าเดิม หรือ B ปรับเงื่อนไขให้ยืดหยุ่นขึ้น
    </div>
    
    <div class="path-grid">
      <div class="path-card ${chosen==='A'?'selected':''}" onclick="selectPath('A')">
        <div class="letter">A</div>
        <div class="title">เพิ่มเงิน</div>
        <div class="desc">เก็บเต็มเป้า อายุเกษียณเดิม ผลตอบแทนเดิม</div>
        <div class="numbers">
          <div class="row"><span>เป้ากองทุน</span><b>${fmt(corpusA)}</b></div>
          <div class="row"><span>ผลตอบแทน</span><b>${returnA}%</b></div>
          <div class="row"><span>เกษียณ</span><b>${ageA} ปี</b></div>
          <div class="row" style="border-top:1px dashed var(--grey-line); padding-top:6px; margin-top:6px">
            <span><b>เก็บ/ปี</b></span><b style="color:var(--red); font-size:16px">${fmt(pmtA)}</b></div>
          ${p.premium ? `<div class="row"><span>เบี้ยประกัน/ปี</span><b style="color:var(--red)">${fmt(p.premium)}</b></div>` : ''}
        </div>
      </div>
      
      <div class="path-card ${chosen==='B'?'selected':''}" onclick="selectPath('B')">
        <div class="letter">B</div>
        <div class="title">ปรับเงื่อนไข</div>
        <div class="desc">ยืดหยุ่น — ปรับผลตอบแทน + เลื่อนเกษียณ</div>
        <div class="numbers">
          <div class="row"><span>เป้ากองทุน</span><b>${fmt(corpusB)}</b></div>
          <div class="row"><span>ผลตอบแทน</span><b style="color:${adjReturnRate>returnA?'var(--green-dark)':'var(--navy)'}">${adjReturnRate}%</b></div>
          <div class="row"><span>เกษียณ</span><b style="color:${ageB>ageA?'var(--orange)':'var(--navy)'}">${ageB} ปี</b></div>
          <div class="row" style="border-top:1px dashed var(--grey-line); padding-top:6px; margin-top:6px">
            <span><b>เก็บ/ปี</b></span><b style="color:var(--red); font-size:16px">${fmt(pmtB)}</b></div>
          ${p.premium ? `<div class="row"><span>เบี้ยประกัน/ปี</span><b style="color:var(--red)">${fmt(p.premium)}</b></div>` : ''}
        </div>
      </div>
    </div>
    
    <div class="section-block">
      <h3>📋 สรุปข้อมูลทั้งหมด</h3>
      <table class="simple-table">
        <tr><td>ลูกค้า</td><td class="right bold">${c.profile.name||'-'}</td></tr>
        <tr><td>โปรไฟล์</td><td class="right bold">${profileTypeLabel(c.profile.profileType)}</td></tr>
        <tr><td>อายุ / เกษียณ / อายุขัย</td><td class="right bold">${fmtAge(c.profile.dob)||g.currentAge||'-'} → ${g.retireAge||60} → ${g.lifeExpectancy||90} ปี</td></tr>
        <tr><td>เงินใช้ / ปี (วันนี้)</td><td class="right bold">${fmt(g.annualExpense||0)} บาท</td></tr>
        <tr><td>กระแสเงินสด / ปี (เกษียณ)</td><td class="right bold">${fmt(g.cashFlowAnnual||0)} บาท</td></tr>
        <tr class="highlight"><td><b>เป้ากองทุนเกษียณ</b></td><td class="right bold" style="color:var(--gold)">${fmt(m.requiredCorpus)} บาท</td></tr>
        <tr><td>สินทรัพย์ที่เตรียมไว้ (FV)</td><td class="right bold text-green">${fmt(m.fvOfAssets)} บาท</td></tr>
        <tr><td>ต้องเตรียมเพิ่ม</td><td class="right bold text-red">${fmt(m.gap)} บาท</td></tr>
        <tr class="highlight"><td><b>เก็บเงินเพิ่ม / ปี</b></td><td class="right bold" style="color:var(--red)">${fmt(chosen==='B'?pmtB:pmtA)} บาท</td></tr>
        ${p.protectionPct ? `
          <tr><td>ปกป้อง %</td><td class="right bold">${p.protectionPct}%</td></tr>
          <tr><td>ทุนประกันเพิ่ม</td><td class="right bold">${fmt(p.sumInsured)} บาท</td></tr>
          <tr class="highlight"><td><b>เบี้ยประกัน / ปี</b></td><td class="right bold" style="color:var(--red)">${fmt(p.premium)} บาท</td></tr>
        ` : ''}
      </table>
    </div>
    
    <div class="flex-row mt-16" style="gap:12px; flex-wrap:wrap">
      <button class="btn-primary" onclick="exportPDF()">🖨️ พิมพ์ / Save PDF</button>
      <button class="btn-secondary" onclick="exportCustomerJSON('${c.id}')">📥 Export JSON</button>
      <button class="btn-secondary" onclick="goToDashboard()">← กลับ Dashboard</button>
    </div>
    
    ${renderPhaseFooter(false)}`;
}

function selectPath(key) {
  const c = getActive();
  if (!c.summary) c.summary = {};
  c.summary.chosenPath = key;
  saveAndRefresh();
  render();
  SFX.success();
}

function exportPDF() {
  showToast('กดปุ่ม "Save as PDF" ในหน้าต่างพิมพ์', 'success');
  setTimeout(() => window.print(), 300);
}

/* ============================================================
   DRAG & DROP
   ============================================================ */
function initPhaseInteractions() {
  if (currentPhase === 4) setupPyramidDragDrop();
}

function setupPyramidDragDrop() {
  const chips = document.querySelectorAll('.asset-chip:not(.tier-explainer)');
  const tiers = document.querySelectorAll('.pyramid-tier');
  const bin = document.getElementById('assetBin');
  
  let dragChip = null;
  let touchClone = null;
  
  chips.forEach(chip => {
    if (chip.classList.contains('tier-explainer')) return;
    chip.draggable = true;
    
    chip.addEventListener('dragstart', (e) => {
      dragChip = chip;
      chip.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    chip.addEventListener('dragend', () => {
      chip.classList.remove('dragging');
      dragChip = null;
    });
    
    chip.addEventListener('touchstart', (e) => {
      dragChip = chip;
      chip.classList.add('dragging');
      const rect = chip.getBoundingClientRect();
      touchClone = chip.cloneNode(true);
      touchClone.style.position = 'fixed';
      touchClone.style.zIndex = 9999;
      touchClone.style.opacity = 0.85;
      touchClone.style.pointerEvents = 'none';
      touchClone.style.left = rect.left + 'px';
      touchClone.style.top = rect.top + 'px';
      touchClone.style.width = rect.width + 'px';
      document.body.appendChild(touchClone);
      e.preventDefault();
    }, { passive: false });
    
    chip.addEventListener('touchmove', (e) => {
      if (!touchClone) return;
      const t = e.touches[0];
      touchClone.style.left = (t.clientX - 40) + 'px';
      touchClone.style.top = (t.clientY - 20) + 'px';
      e.preventDefault();
    }, { passive: false });
    
    chip.addEventListener('touchend', (e) => {
      if (!dragChip) return;
      const t = e.changedTouches[0];
      const target = document.elementFromPoint(t.clientX, t.clientY);
      const tier = target?.closest('.pyramid-tier');
      const binTarget = target?.closest('#assetBin');
      if (tier) handleDrop(dragChip, tier.getAttribute('data-tier'));
      else if (binTarget) handleDrop(dragChip, null);
      dragChip.classList.remove('dragging');
      if (touchClone) { touchClone.remove(); touchClone = null; }
      dragChip = null;
    });
  });
  
  tiers.forEach(tier => {
    tier.addEventListener('dragover', (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; });
    tier.addEventListener('drop', (e) => {
      e.preventDefault();
      if (!dragChip) return;
      handleDrop(dragChip, tier.getAttribute('data-tier'));
    });
  });
  
  if (bin) {
    bin.addEventListener('dragover', e => e.preventDefault());
    bin.addEventListener('drop', e => {
      e.preventDefault();
      if (!dragChip) return;
      handleDrop(dragChip, null);
    });
  }
}

function handleDrop(chip, tier) {
  const id = chip.getAttribute('data-asset-id');
  if (!id) return;
  const c = getActive();
  if (!c.pyramidBefore) c.pyramidBefore = {};
  if (tier) {
    c.pyramidBefore[id] = tier;
    SFX.drop();
  } else {
    delete c.pyramidBefore[id];
    SFX.remove();
  }
  saveAndRefresh();
  render();
}

/* ============================================================
   INIT
   ============================================================ */
document.getElementById('soundBtn').textContent = soundEnabled ? '🔊' : '🔇';
render();

document.addEventListener('click', function resumeAudio() {
  const ctx = getAudioCtx();
  if (ctx && ctx.state === 'suspended') ctx.resume();
}, { once: true });
