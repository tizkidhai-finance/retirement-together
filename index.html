<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เกษียนด้วยกัน by ติสคิดให้</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --navy: #0d1f3c;
  --navy-light: #1a2e52;
  --gold: #d4af37;
  --gold-light: #f4cf5a;
  --green: #27ae60;
  --green-dark: #1d8348;
  --red: #c0392b;
  --red-light: #e74c3c;
  --orange: #e67e22;
  --grey-bg: #f5f6f8;
  --grey-line: #d8dde3;
  --grey-text: #6c7a89;
  --shadow-sm: 0 2px 8px rgba(13,31,60,0.08);
  --shadow-md: 0 4px 16px rgba(13,31,60,0.15);
  --shadow-lg: 0 12px 40px rgba(13,31,60,0.22);
}
html { font-size: 18px; }  /* base bumped from 14 */
body {
  font-family: 'IBM Plex Sans Thai', system-ui, sans-serif;
  background: var(--grey-bg);
  color: #1a1a1a;
  font-size: 1rem;
  line-height: 1.5;
  min-height: 100vh;
}
button { font-family: inherit; cursor: pointer; border: none; font-size: 1rem; }
input, select, textarea { font-family: inherit; font-size: 1rem; }

/* TOP BAR */
.topbar {
  background: var(--navy);
  color: white;
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow-sm);
}
.topbar-brand { display: flex; align-items: center; gap: 12px; cursor: pointer; }
.topbar-logo {
  width: 42px; height: 42px;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
}
.topbar-title { font-size: 20px; font-weight: 700; }
.topbar-sub { font-size: 13px; color: rgba(255,255,255,0.6); }
.topbar-actions { display: flex; gap: 10px; align-items: center; }
.topbar-btn {
  background: rgba(255,255,255,0.12);
  color: white;
  padding: 10px 18px;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: background 0.2s;
}
.topbar-btn:hover { background: rgba(255,255,255,0.22); }
.sound-toggle {
  background: rgba(255,255,255,0.12);
  width: 44px; height: 44px;
  border-radius: 10px;
  font-size: 20px;
  color: white;
}
.sound-toggle:hover { background: rgba(255,255,255,0.22); }

.app { max-width: 1400px; margin: 0 auto; padding: 24px 20px; }

/* DASHBOARD */
.dashboard-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin-bottom: 24px;
  flex-wrap: wrap;
  gap: 16px;
}
.dashboard-title h1 {
  font-size: 32px;
  font-weight: 700;
  color: var(--navy);
}
.dashboard-title p { color: var(--grey-text); font-size: 16px; margin-top: 4px; }

.btn-primary {
  background: var(--navy);
  color: white;
  padding: 14px 26px;
  border-radius: 12px;
  font-weight: 600;
  font-size: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: all 0.2s;
}
.btn-primary:hover { background: var(--navy-light); transform: translateY(-1px); }
.btn-secondary {
  background: white;
  color: var(--navy);
  padding: 12px 22px;
  border-radius: 12px;
  font-weight: 500;
  font-size: 15px;
  border: 1.5px solid var(--grey-line);
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn-secondary:hover { background: #f8f9fa; border-color: var(--navy); }
.btn-action {
  background: var(--gold);
  color: var(--navy);
  padding: 12px 22px;
  border-radius: 12px;
  font-weight: 700;
  font-size: 15px;
  border: none;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn-action:hover { background: var(--gold-light); }

.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 14px;
  margin-bottom: 24px;
}
.stat-card {
  background: white;
  padding: 18px;
  border-radius: 14px;
  border: 1px solid var(--grey-line);
}
.stat-card .label { font-size: 13px; color: var(--grey-text); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; }
.stat-card .value { font-size: 30px; font-weight: 700; color: var(--navy); margin-top: 6px; }
.stat-card .sub { font-size: 13px; color: var(--grey-text); margin-top: 2px; }
.stat-card.green .value { color: var(--green); }
.stat-card.gold .value { color: var(--gold); }

.filter-bar {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  flex-wrap: wrap;
  align-items: center;
}
.search-box {
  flex: 1;
  min-width: 240px;
  background: white;
  border: 1.5px solid var(--grey-line);
  border-radius: 12px;
  padding: 12px 18px;
  font-size: 15px;
  outline: none;
}
.search-box:focus { border-color: var(--navy); }
.filter-pill {
  background: white;
  border: 1.5px solid var(--grey-line);
  padding: 10px 18px;
  border-radius: 999px;
  font-size: 14px;
  color: var(--grey-text);
  font-weight: 500;
  transition: all 0.15s;
}
.filter-pill.active { background: var(--navy); color: white; border-color: var(--navy); }
.filter-pill:hover:not(.active) { border-color: var(--navy); color: var(--navy); }

.customer-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 16px;
}
.customer-card {
  background: white;
  border-radius: 14px;
  padding: 20px;
  border: 1.5px solid var(--grey-line);
  transition: all 0.2s;
  cursor: pointer;
  position: relative;
}
.customer-card:hover {
  border-color: var(--navy);
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
}
.customer-card .status-dot {
  position: absolute;
  top: 20px;
  right: 20px;
  width: 12px; height: 12px;
  border-radius: 50%;
}
.status-in_progress { background: #3498db; }
.status-hot { background: var(--orange); }
.status-won { background: var(--green); }
.status-lost { background: var(--red); }
.status-paused { background: var(--grey-text); }

.customer-card .name {
  font-size: 19px;
  font-weight: 700;
  color: var(--navy);
  padding-right: 30px;
}
.customer-card .meta { font-size: 14px; color: var(--grey-text); margin-top: 4px; }
.customer-card .meta-row { font-size: 14px; color: #555; margin-top: 6px; }
.customer-card .meta-row b { color: #1a1a1a; }
.customer-card .progress-bar {
  margin-top: 14px;
  height: 8px;
  background: #eef0f3;
  border-radius: 99px;
  overflow: hidden;
}
.customer-card .progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--gold-light));
  transition: width 0.3s;
}
.customer-card .progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  color: var(--grey-text);
  margin-top: 8px;
}
.customer-card .actions { margin-top: 14px; display: flex; gap: 8px; }
.customer-card .actions button {
  flex: 1;
  padding: 8px;
  font-size: 13px;
  border-radius: 8px;
  border: 1.5px solid var(--grey-line);
  background: #f8f9fa;
  color: #555;
  font-weight: 500;
}
.customer-card .actions button:hover { background: var(--navy); color: white; border-color: var(--navy); }

.status-tag-row {
  margin-top: 12px;
  padding-top: 10px;
  border-top: 1px dashed var(--grey-line);
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  align-items: center;
}
.status-tag-label {
  font-size: 12px;
  color: var(--grey-text);
  font-weight: 500;
  margin-right: 4px;
}
.status-tag {
  padding: 5px 9px;
  font-size: 12px;
  border-radius: 99px;
  border: 1.5px solid var(--grey-line);
  background: white;
  color: var(--grey-text);
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}
.status-tag:hover { border-color: var(--navy); color: var(--navy); }
.status-tag.active.status-tag-in_progress { background: #3498db; color: white; border-color: #3498db; }
.status-tag.active.status-tag-hot { background: var(--orange); color: white; border-color: var(--orange); }
.status-tag.active.status-tag-won { background: var(--green); color: white; border-color: var(--green); }
.status-tag.active.status-tag-lost { background: var(--red); color: white; border-color: var(--red); }
.status-tag.active.status-tag-paused { background: var(--grey-text); color: white; border-color: var(--grey-text); }

.empty-state {
  text-align: center;
  padding: 80px 20px;
  background: white;
  border-radius: 14px;
  border: 2px dashed var(--grey-line);
}
.empty-state .icon { font-size: 64px; opacity: 0.3; }
.empty-state h3 { color: var(--navy); margin: 16px 0 6px; font-size: 22px; }
.empty-state p { color: var(--grey-text); margin-bottom: 20px; font-size: 15px; }

/* CUSTOMER VIEW */
.customer-banner {
  background: linear-gradient(135deg, var(--navy), var(--navy-light));
  color: white;
  border-radius: 14px;
  padding: 22px 28px;
  margin-bottom: 18px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
}
.customer-banner h2 { font-size: 26px; }
.customer-banner .meta { color: rgba(255,255,255,0.7); font-size: 15px; margin-top: 4px; }
.customer-banner .profile-tag {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 99px;
  font-size: 13px;
  font-weight: 700;
  background: var(--gold);
  color: var(--navy);
  margin-left: 10px;
  vertical-align: 3px;
}
.customer-banner .right-actions { display: flex; gap: 8px; }
.customer-banner .right-actions button {
  background: rgba(255,255,255,0.15);
  color: white;
  padding: 10px 18px;
  font-size: 15px;
  border-radius: 10px;
  font-weight: 500;
}
.customer-banner .right-actions button:hover { background: rgba(255,255,255,0.25); }

.phase-nav {
  background: white;
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 18px;
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 8px;
  border: 1.5px solid var(--grey-line);
}
.phase-nav-item {
  background: #f5f6f8;
  border: 2px solid transparent;
  padding: 12px 6px;
  border-radius: 10px;
  text-align: center;
  font-size: 13px;
  font-weight: 500;
  color: var(--grey-text);
  transition: all 0.15s;
}
.phase-nav-item:hover { border-color: var(--navy); color: var(--navy); }
.phase-nav-item.active {
  background: var(--navy);
  color: white;
  border-color: var(--navy);
}
.phase-nav-item.done { background: #eaf6ee; color: var(--green-dark); }
.phase-nav-item.done.active { background: var(--green-dark); color: white; }
.phase-nav-item .num { display: block; font-size: 18px; font-weight: 700; margin-bottom: 3px; }

.phase-container {
  background: white;
  border-radius: 14px;
  padding: 28px;
  border: 1.5px solid var(--grey-line);
  margin-bottom: 18px;
}
.phase-header {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px 14px;
  padding-bottom: 18px;
  border-bottom: 1.5px solid var(--grey-line);
  margin-bottom: 24px;
}
.phase-badge {
  background: var(--navy);
  color: white;
  padding: 6px 14px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.5px;
}
.phase-header h2 { font-size: 26px; color: var(--navy); }
.phase-subtitle {
  flex: 0 0 100%;
  font-size: 14px;
  color: var(--grey-text);
  margin-top: 4px;
  font-weight: 400;
}

/* Phase 3 section heads */
.p3-section-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 12px;
}
.p3-section-head h3 {
  margin-bottom: 4px !important;
}
.p3-section-head p {
  font-size: 13px;
  margin-top: 0;
  line-height: 1.5;
}

/* Quick-add pills (Phase 3) */
.quick-add-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin: 10px 0 14px;
  padding: 10px 12px;
  background: white;
  border-radius: 10px;
  border: 1px dashed var(--grey-line);
  align-items: center;
}
.quick-add-label {
  font-size: 12px;
  color: var(--grey-text);
  font-weight: 600;
  letter-spacing: 0.05em;
  margin-right: 4px;
}
.quick-pill {
  background: var(--grey-bg);
  border: 1px solid var(--grey-line);
  color: var(--navy);
  padding: 6px 12px;
  border-radius: 99px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.quick-pill:hover {
  background: var(--navy);
  color: white;
  border-color: var(--navy);
  transform: translateY(-1px);
}
.quick-pill:active { transform: translateY(0); }

/* FORMS */
.form-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 16px;
  margin-bottom: 16px;
}
.form-grid.cols-2 { grid-template-columns: repeat(2, 1fr); }
.form-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
.form-grid.cols-4 { grid-template-columns: repeat(4, 1fr); }
@media (max-width: 760px) {
  .form-grid.cols-2, .form-grid.cols-3, .form-grid.cols-4 { grid-template-columns: 1fr; }
}

.form-field { display: flex; flex-direction: column; }
.form-field label {
  font-size: 14px;
  color: var(--grey-text);
  font-weight: 600;
  margin-bottom: 6px;
}
.form-field input, .form-field select, .form-field textarea {
  padding: 12px 16px;
  border: 1.5px solid var(--grey-line);
  border-radius: 10px;
  background: white;
  outline: none;
  transition: border 0.15s;
  font-size: 16px;
}
.form-field input:focus, .form-field select:focus, .form-field textarea:focus {
  border-color: var(--navy);
}
.form-field .helper { font-size: 13px; color: var(--grey-text); margin-top: 5px; }

.section-block {
  background: #fafbfc;
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 18px;
  border: 1.5px solid #eef0f3;
}
.section-block h3 {
  font-size: 17px;
  color: var(--navy);
  margin-bottom: 14px;
  font-weight: 700;
}
.section-block.blue { background: #eef5fc; border-color: #d6e7f7; }
.section-block.green { background: #eef8f1; border-color: #cfe9d8; }
.section-block.yellow { background: #fff8e1; border-color: #ffe082; }
.section-block.red { background: #fdf0f0; border-color: #f5c8c4; }
.section-block.compact { padding: 14px 18px; }
.section-block.compact h3 { font-size: 15px; margin-bottom: 10px; }

/* Dependents row — compact inline layout */
.dep-block {
  margin-bottom: 12px;
}
.dep-block:last-child { margin-bottom: 0; }
.dep-block-label {
  font-size: 12px;
  font-weight: 700;
  color: var(--grey-text);
  letter-spacing: 0.05em;
  margin-bottom: 6px;
  text-transform: uppercase;
}
.dependents-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
}
.dep-mini {
  display: inline-flex;
  align-items: center;
  background: white;
  border: 1.5px solid var(--grey-line);
  border-radius: 8px;
  overflow: hidden;
  height: 36px;
}
.dep-mini:focus-within { border-color: var(--navy); }
.dep-mini .mini-prefix {
  font-size: 12px;
  color: var(--grey-text);
  padding: 0 8px 0 10px;
  background: #fafbfc;
  height: 100%;
  display: flex;
  align-items: center;
  font-weight: 500;
  border-right: 1px solid var(--grey-line);
  white-space: nowrap;
}
.dep-mini .mini-suffix {
  font-size: 12px;
  color: var(--grey-text);
  padding: 0 10px 0 0;
  height: 100%;
  display: flex;
  align-items: center;
  font-weight: 500;
  white-space: nowrap;
}
.dep-mini input {
  border: none;
  outline: none;
  padding: 0 10px;
  font-size: 14px;
  font-weight: 600;
  color: var(--navy);
  background: white;
  width: 50px;
  height: 100%;
  font-family: inherit;
}
.dep-mini input[type="text"] { width: 110px; }
.dep-mini.wide input { width: 90px; }
.dep-mini.grow { flex: 1; min-width: 160px; }
.dep-mini.grow input { width: 100%; }

/* Children list */
.children-list {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 8px;
}
.children-empty {
  font-size: 13px;
  color: var(--grey-text);
  font-style: italic;
  padding: 8px 12px;
  background: white;
  border: 1px dashed var(--grey-line);
  border-radius: 8px;
}
.child-row {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: white;
  border-radius: 8px;
  padding: 4px;
  border: 1px solid var(--grey-line);
}
.gender-toggle {
  border: none;
  border-radius: 6px;
  padding: 7px 12px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  font-family: inherit;
  height: 36px;
}
.gender-toggle.boy { background: #e3f0fa; color: #2980b9; }
.gender-toggle.boy:hover { background: #2980b9; color: white; }
.gender-toggle.girl { background: #fce4ec; color: #c2185b; }
.gender-toggle.girl:hover { background: #c2185b; color: white; }

.child-row .dep-mini {
  height: 36px;
}
.child-row .dep-mini input {
  width: 50px;
}
.child-row .bd-remove {
  background: white;
  border: 1px solid var(--grey-line);
  color: var(--red);
  width: 28px;
  height: 28px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.child-row .bd-remove:hover { background: var(--red); color: white; border-color: var(--red); }

.dep-add-btn {
  background: white;
  border: 1.5px dashed var(--grey-line);
  color: var(--navy);
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
}
.dep-add-btn:hover { border-color: var(--navy); border-style: solid; background: #eef5fc; }

.dep-check {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: white;
  border: 1.5px solid var(--grey-line);
  border-radius: 8px;
  padding: 6px 12px;
  font-size: 14px;
  font-weight: 500;
  color: var(--navy);
  cursor: pointer;
  height: 36px;
  transition: all 0.15s;
}
.dep-check:has(input:checked) {
  background: var(--navy);
  color: white;
  border-color: var(--navy);
}
.dep-check input {
  width: 16px;
  height: 16px;
  margin: 0;
  cursor: pointer;
}

/* Pain Points compact */
.section-block.red .pain-text {
  width: 100%;
  padding: 10px 12px;
  border-radius: 8px;
  border: 1.5px solid #f5c8c4;
  background: white;
  font-family: inherit;
  font-size: 14.5px;
  line-height: 1.55;
  resize: vertical;
  min-height: 56px;
  outline: none;
  transition: border-color 0.15s;
}
.section-block.red .pain-text:focus { border-color: var(--red); }

@media (max-width: 600px) {
  .dependents-row { gap: 12px; }
  .dep-group { width: 100%; }
  .dep-mini.grow { width: 100%; }
}

.profile-selector {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin-top: 10px;
}
.profile-option {
  background: white;
  border: 2.5px solid var(--grey-line);
  border-radius: 12px;
  padding: 20px 14px;
  text-align: center;
  transition: all 0.15s;
  cursor: pointer;
}
.profile-option:hover { border-color: var(--navy); }
.profile-option.selected {
  border-color: var(--gold);
  background: #fff8e1;
}
.profile-option .pic { font-size: 40px; }
.profile-option .name { font-weight: 700; color: var(--navy); margin-top: 6px; font-size: 16px; }
.profile-option .desc { font-size: 13px; color: var(--grey-text); margin-top: 4px; }

/* ASSET ROWS */
.row-grid {
  display: grid;
  gap: 10px;
  margin-bottom: 10px;
  align-items: center;
}
.row-grid input, .row-grid select { padding: 10px 14px; border: 1.5px solid var(--grey-line); border-radius: 8px; font-size: 15px; }
.remove-btn {
  width: 38px; height: 38px;
  background: #fdf0f0;
  color: var(--red);
  border-radius: 8px;
  font-size: 20px;
  font-weight: 700;
  border: none;
  cursor: pointer;
}
.remove-btn:hover { background: var(--red); color: white; }
.add-btn {
  background: white;
  color: var(--navy);
  border: 2px dashed var(--grey-line);
  padding: 10px 18px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 500;
  width: 100%;
  margin-top: 6px;
}
.add-btn:hover { border-color: var(--navy); border-style: solid; background: #eef5fc; }
.use-checkbox {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  padding: 0 8px;
  white-space: nowrap;
}
.use-checkbox input { transform: scale(1.3); }

/* === Breakdown UI (Phase 2 income/expense + Phase 3 cashflows) === */
.amount-field {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.amount-input-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
.amount-input-row input.amount-main {
  flex: 1;
  font-size: 18px;
  font-weight: 600;
  padding: 12px 14px;
}
.amount-input-row input.amount-main:disabled {
  background: #f0f4f8;
  color: var(--navy);
  cursor: not-allowed;
}
.breakdown-toggle {
  background: white;
  border: 1.5px dashed var(--navy);
  color: var(--navy);
  padding: 10px 16px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
}
.breakdown-toggle:hover { background: #eef5fc; }
.breakdown-toggle.active {
  background: var(--navy);
  color: white;
  border-style: solid;
}
.breakdown-zone {
  background: #fafbfc;
  border: 1.5px solid var(--grey-line);
  border-radius: 10px;
  padding: 12px;
  margin-top: 8px;
}
.breakdown-zone .bd-empty {
  text-align: center;
  color: var(--grey-text);
  padding: 12px 0;
  font-size: 14px;
}
.breakdown-row {
  display: grid;
  grid-template-columns: 2fr 1.2fr auto auto;
  gap: 8px;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px dashed var(--grey-line);
}
.breakdown-row:last-of-type { border-bottom: none; }
.breakdown-row input {
  padding: 8px 10px;
  border: 1px solid var(--grey-line);
  border-radius: 6px;
  font-size: 14px;
  background: white;
}
.breakdown-row input.bd-amount {
  text-align: right;
  font-weight: 600;
  color: var(--navy);
}
.bd-flag {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 99px;
  white-space: nowrap;
  cursor: pointer;
  border: 1.5px solid var(--grey-line);
  background: white;
  color: var(--grey-text);
  font-weight: 600;
  transition: all 0.15s;
}
.bd-flag.active {
  background: var(--green);
  color: white;
  border-color: var(--green);
}
.bd-flag.sacred {
  background: #fff8e1;
  color: var(--navy);
  border-color: var(--gold);
}
.bd-remove {
  background: white;
  border: 1px solid var(--grey-line);
  color: var(--red);
  width: 30px;
  height: 30px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.bd-remove:hover { background: var(--red); color: white; border-color: var(--red); }
.bd-add {
  background: white;
  border: 1.5px dashed var(--grey-line);
  color: var(--navy);
  padding: 8px 14px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
  width: 100%;
  transition: all 0.15s;
}
.bd-add:hover { border-color: var(--navy); border-style: solid; background: #eef5fc; }
.bd-summary {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 4px 4px;
  margin-top: 6px;
  border-top: 2px solid var(--grey-line);
  font-size: 14px;
  color: var(--navy);
}
.bd-summary .bd-total {
  font-size: 18px;
  font-weight: 700;
}
.bd-summary .bd-total.regular { color: var(--green-dark); }
.bd-tip {
  font-size: 12px;
  color: var(--grey-text);
  font-style: italic;
  padding: 4px 6px;
}

@media (max-width: 600px) {
  .breakdown-row {
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .breakdown-row .bd-flag {
    grid-column: 1 / -1;
  }
  .breakdown-row .bd-remove {
    grid-column: 2 / 3;
    justify-self: end;
  }
}

/* === CASHFLOW HEALTH CARD === */
.cashflow-health {
  background: linear-gradient(180deg, #fafbfc 0%, white 100%);
  border-radius: 16px;
  padding: 24px;
  margin-top: 20px;
  border: 1.5px solid var(--grey-line);
  box-shadow: var(--shadow-sm);
}
.cfh-header { margin-bottom: 18px; }
.cfh-eyebrow {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.15em;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 4px;
}
.cfh-title {
  font-size: 22px;
  font-weight: 700;
  color: var(--navy);
  letter-spacing: -0.01em;
}

/* Hero block with score */
.cfh-hero {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 24px;
  align-items: center;
  padding: 22px;
  border-radius: 14px;
  border: 2px solid;
  margin-bottom: 18px;
}
.cfh-score-circle {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  border: 4px solid;
  background: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.cfh-score-num {
  font-size: 36px;
  font-weight: 900;
  line-height: 1;
}
.cfh-score-max {
  font-size: 13px;
  font-weight: 600;
  opacity: 0.7;
  margin-top: 2px;
}
.cfh-tier-info { min-width: 0; }
.cfh-tier-emoji { font-size: 22px; margin-bottom: 2px; }
.cfh-tier-label {
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.01em;
  margin-bottom: 6px;
}
.cfh-tier-tip {
  font-size: 14px;
  color: #2c3e50;
  line-height: 1.5;
}

@media (max-width: 600px) {
  .cfh-hero { grid-template-columns: 1fr; text-align: center; gap: 14px; }
  .cfh-score-circle { margin: 0 auto; }
}

/* Money flow */
.cfh-flow {
  background: white;
  border-radius: 12px;
  padding: 16px 18px;
  margin-bottom: 18px;
  border: 1px solid var(--grey-line);
}
.cfh-flow-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 7px 0;
  font-size: 15px;
  color: #2c3e50;
}
.cfh-flow-row.total {
  border-top: 2px solid var(--grey-line);
  margin-top: 6px;
  padding-top: 12px;
  font-size: 17px;
  font-weight: 700;
}
.cfh-flow-row.sub {
  font-size: 13px;
  color: var(--grey-text);
  padding-top: 2px;
}
.cfh-flow-label { color: var(--grey-text); font-weight: 500; }
.cfh-flow-row.total .cfh-flow-label { color: var(--navy); }
.cfh-flow-val { font-weight: 700; font-feature-settings: "tnum"; }
.cfh-flow-val.plus { color: var(--green-dark); }
.cfh-flow-val.minus { color: var(--red); }

/* 50/30/20 Bars */
.cfh-rule {
  background: white;
  border-radius: 12px;
  padding: 18px;
  margin-bottom: 18px;
  border: 1px solid var(--grey-line);
}
.cfh-rule-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--navy);
  margin-bottom: 14px;
  letter-spacing: 0.02em;
}
.cfh-bar-row { margin-bottom: 14px; }
.cfh-bar-row:last-of-type { margin-bottom: 4px; }
.cfh-bar-label {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 6px;
  font-size: 14px;
  color: #2c3e50;
}
.cfh-bar-pct {
  font-weight: 700;
  font-size: 13px;
  font-feature-settings: "tnum";
}
.cfh-bar-pct.ok { color: var(--green); }
.cfh-bar-pct.over { color: var(--red); }
.cfh-bar-pct.good { color: var(--green-dark); }
.cfh-bar-pct.low { color: var(--orange); }

.cfh-info {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--grey-bg);
  color: var(--grey-text);
  font-size: 10px;
  font-weight: 700;
  margin-left: 4px;
  cursor: help;
  border: 1px solid var(--grey-line);
  vertical-align: middle;
}
.cfh-info:hover {
  background: var(--navy);
  color: white;
  border-color: var(--navy);
}

.cfh-bar-track {
  position: relative;
  height: 16px;
  background: #f0f4f8;
  border-radius: 99px;
  overflow: hidden;
  margin-bottom: 4px;
}
.cfh-bar-fill {
  position: absolute;
  top: 0;
  left: 0;
  height: 100%;
  border-radius: 99px;
  transition: width 0.4s ease;
}
.cfh-bar-fill.needs { background: linear-gradient(90deg, #c0392b, #e74c3c); }
.cfh-bar-fill.wants { background: linear-gradient(90deg, #d4af37, #f4cf5a); }
.cfh-bar-fill.savings { background: linear-gradient(90deg, #1d8348, #27ae60); }
.cfh-bar-target {
  position: absolute;
  top: -3px;
  bottom: -3px;
  width: 2px;
  background: var(--navy);
  z-index: 2;
}
.cfh-bar-target::after {
  content: '🎯';
  position: absolute;
  top: -16px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 10px;
}
.cfh-bar-meta {
  font-size: 12px;
  color: var(--grey-text);
  font-feature-settings: "tnum";
}

/* Score components */
.cfh-components {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}
.cfh-component {
  background: white;
  border: 1px solid var(--grey-line);
  border-radius: 10px;
  padding: 12px 14px;
  text-align: center;
}
.cfh-comp-label {
  font-size: 12px;
  color: var(--grey-text);
  font-weight: 600;
  margin-bottom: 6px;
}
.cfh-comp-score {
  font-size: 22px;
  font-weight: 800;
  color: var(--navy);
  font-feature-settings: "tnum";
  line-height: 1;
  margin-bottom: 4px;
}
.cfh-comp-meta {
  font-size: 11px;
  color: var(--grey-text);
}
@media (max-width: 600px) {
  .cfh-components { grid-template-columns: 1fr; }
}

/* === Expense breakdown — 3 categories === */
.bd-quickadd {
  background: white;
  border: 1px dashed var(--grey-line);
  border-radius: 10px;
  padding: 10px 12px;
  margin-bottom: 12px;
}
.bd-qa-row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 6px;
  padding: 4px 0;
}
.bd-qa-row + .bd-qa-row { border-top: 1px dashed #f0f4f8; padding-top: 8px; margin-top: 4px; }
.bd-qa-label {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.04em;
  margin-right: 6px;
  white-space: nowrap;
  min-width: 84px;
}
.bd-qa-label.needs-label { color: var(--red); }
.bd-qa-label.wants-label { color: var(--orange); }
.bd-qa-label.savings-label { color: var(--green-dark); }

.bd-qa-pill {
  background: var(--grey-bg);
  border: 1px solid var(--grey-line);
  color: var(--navy);
  padding: 5px 11px;
  border-radius: 99px;
  font-size: 12.5px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.bd-qa-pill.needs:hover { background: var(--red); color: white; border-color: var(--red); }
.bd-qa-pill.wants:hover { background: var(--orange); color: white; border-color: var(--orange); }
.bd-qa-pill.savings:hover { background: var(--green); color: white; border-color: var(--green); }

/* Expense row with 5 columns */
.breakdown-row.exp-row {
  grid-template-columns: 2fr 1.1fr auto auto auto;
  border-left: 3px solid transparent;
  padding-left: 6px;
  margin-left: -6px;
  border-radius: 6px;
}
.breakdown-row.exp-row.cat-needs { border-left-color: rgba(192,57,43,0.5); }
.breakdown-row.exp-row.cat-wants { border-left-color: rgba(230,126,34,0.5); }
.breakdown-row.exp-row.cat-savings { border-left-color: rgba(39,174,96,0.5); }

.bd-cat-btn {
  font-size: 11px;
  font-weight: 700;
  padding: 5px 10px;
  border-radius: 99px;
  border: 1.5px solid;
  cursor: pointer;
  background: white;
  white-space: nowrap;
  transition: all 0.15s;
}
.bd-cat-btn.cat-needs { color: var(--red); border-color: rgba(192,57,43,0.4); }
.bd-cat-btn.cat-wants { color: var(--orange); border-color: rgba(230,126,34,0.4); }
.bd-cat-btn.cat-savings { color: var(--green-dark); border-color: rgba(39,174,96,0.4); }
.bd-cat-btn:hover { transform: translateY(-1px); }
.bd-cat-btn.cat-needs:hover { background: var(--red); color: white; }
.bd-cat-btn.cat-wants:hover { background: var(--orange); color: white; }
.bd-cat-btn.cat-savings:hover { background: var(--green); color: white; }

@media (max-width: 600px) {
  .breakdown-row.exp-row {
    grid-template-columns: 1fr 1fr auto;
    gap: 6px;
  }
  .breakdown-row.exp-row .bd-cat-btn {
    grid-column: 1 / 4;
  }
  .breakdown-row.exp-row .bd-flag {
    grid-column: 1 / 3;
  }
  .breakdown-row.exp-row .bd-remove {
    grid-column: 3 / 4;
  }
}

/* === REALITY CHECK (Phase 5 footer) === */
.reality-check {
  border-radius: 14px;
  padding: 18px 20px;
  margin-top: 20px;
  border: 2px solid;
}
.reality-check.safe { background: #e8f8ef; border-color: var(--green); }
.reality-check.warning { background: #fff8e1; border-color: var(--gold); }
.reality-check.danger { background: #fdecea; border-color: var(--red); }
.rc-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.rc-icon { font-size: 22px; }
.rc-title { font-weight: 800; color: var(--navy); font-size: 17px; }
.rc-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 12px;
}
.rc-cell { background: white; padding: 10px 14px; border-radius: 10px; border: 1px solid var(--grey-line); }
.rc-label { font-size: 11px; color: var(--grey-text); font-weight: 600; }
.rc-val { font-size: 18px; font-weight: 800; color: var(--navy); font-feature-settings: "tnum"; line-height: 1.1; }
.rc-val.red { color: var(--red); }
.rc-val.green { color: var(--green-dark); }
.rc-sub { font-size: 10px; color: var(--grey-text); margin-top: 2px; }
.rc-msg {
  background: white;
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 14px;
  color: #2c3e50;
  font-weight: 500;
  margin-bottom: 8px;
}
.rc-cta {
  font-size: 13px;
  color: var(--navy);
  font-weight: 600;
  background: white;
  padding: 8px 14px;
  border-radius: 8px;
  border-left: 3px solid var(--gold);
}
@media (max-width:600px){ .rc-row { grid-template-columns: 1fr; } }

/* === PHASE 6 v4 — เลือกแผนของคุณ (checklist + guides) === */

/* Plan summary (4 cells from Phase 5) */
.plan-summary {
  background: linear-gradient(180deg, #fafbfc 0%, white 100%);
  border-radius: 14px;
  padding: 18px 20px;
  margin-bottom: 20px;
  border: 1.5px solid var(--grey-line);
}
.ps-eyebrow {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 12px;
}
.ps-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}
.ps-cell {
  background: white;
  border-radius: 10px;
  padding: 12px 14px;
  border: 1px solid var(--grey-line);
  text-align: center;
}
.ps-cell.highlight { border-color: var(--gold); background: #fff8e1; }
.ps-label { font-size: 11px; color: var(--grey-text); font-weight: 600; margin-bottom: 4px; }
.ps-val { font-size: 20px; font-weight: 800; color: var(--navy); font-feature-settings: "tnum"; line-height: 1.1; }
.ps-val.red { color: var(--red); }
.ps-val.green { color: var(--green-dark); }
.ps-sub { font-size: 11px; color: var(--grey-text); margin-top: 3px; }
@media (max-width:700px){ .ps-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width:400px){ .ps-grid { grid-template-columns: 1fr; } }

/* Path section */
.path-section { margin-bottom: 22px; }
.path-eyebrow {
  font-size: 14px;
  font-weight: 700;
  color: var(--grey-text);
  letter-spacing: 0.05em;
  margin-bottom: 12px;
  text-transform: uppercase;
}
.path-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
}
@media (max-width:900px){ .path-grid { grid-template-columns: 1fr; } }

.path-card {
  background: white;
  border: 2px solid var(--grey-line);
  border-radius: 14px;
  padding: 18px 16px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}
.path-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.path-card.active.green { border-color: var(--green); background: linear-gradient(180deg, #e8f8ef, white); }
.path-card.active.gold  { border-color: var(--gold); background: linear-gradient(180deg, #fff8e1, white); }
.path-card.active.navy  { border-color: var(--navy); background: linear-gradient(180deg, #eef5fc, white); }
.path-card.active::after {
  content: '✓ เลือกแล้ว';
  position: absolute;
  top: 12px;
  right: 12px;
  font-size: 11px;
  font-weight: 700;
  color: white;
  background: var(--navy);
  padding: 3px 10px;
  border-radius: 99px;
}
.pc-title { font-size: 13px; font-weight: 700; color: var(--grey-text); letter-spacing: 0.1em; text-transform: uppercase; }
.pc-subtitle { font-size: 17px; font-weight: 800; color: var(--navy); margin-bottom: 14px; }

.pc-allocation { margin-bottom: 12px; }
.pc-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 0;
  font-size: 13.5px;
  border-bottom: 1px dashed #f0f4f8;
}
.pc-row.total {
  padding-top: 10px;
  border-bottom: none;
  border-top: 2px solid var(--grey-line);
  margin-top: 6px;
  font-weight: 800;
  color: var(--navy);
  flex-wrap: wrap;
}
.pc-icon { width: 20px; flex-shrink: 0; }
.pc-text { flex: 1; color: #2c3e50; }
.pc-amt { font-weight: 700; color: var(--navy); font-feature-settings: "tnum"; }
.pc-amt-sub { width: 100%; font-size: 11px; font-weight: 500; color: var(--grey-text); text-align: right; }

.pc-warning {
  font-size: 12px;
  font-weight: 700;
  text-align: center;
  padding: 6px 10px;
  border-radius: 99px;
  margin-bottom: 10px;
}
.pc-warning.ok { background: #d4f1de; color: var(--green-dark); }
.pc-warning.warn { background: #fff3cd; color: #856404; }
.pc-warning.over { background: #f8d7da; color: #721c24; }

.pc-tagline { font-size: 12px; color: var(--grey-text); font-style: italic; line-height: 1.5; text-align: center; }

/* Path Editor (after path selected) */
.path-editor {
  background: white;
  border-radius: 14px;
  padding: 22px;
  margin-bottom: 18px;
  border: 1.5px solid var(--grey-line);
  box-shadow: var(--shadow-sm);
}
.pe-header { font-size: 18px; font-weight: 800; color: var(--navy); margin-bottom: 4px; }
.pe-sub { font-size: 13px; color: var(--grey-text); margin-bottom: 18px; }

/* Two legs: เกษียณ + ปกป้อง */
.leg-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 18px;
}
@media (max-width:900px){ .leg-grid { grid-template-columns: 1fr; } }

.leg-card {
  background: #fafbfc;
  border-radius: 12px;
  padding: 16px 18px;
  border: 1px solid var(--grey-line);
}
.leg-card.retire { border-left: 4px solid var(--gold); }
.leg-card.protect { border-left: 4px solid var(--green); }
.leg-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }

/* Insurance row in protect leg */

}

.ins-icon { font-size: 16px; }
.ins-label { font-weight: 700; color: var(--navy); font-size: 14px; }
.ins-product { font-size: 11px; color: var(--grey-text); font-weight: 500; }

}

/* Commitment summary */
.commitment-summary {
  border-radius: 12px;
  padding: 18px 20px;
  border: 2px solid;
}
.commitment-summary.safe { background: #e8f8ef; border-color: var(--green); }
.commitment-summary.warning { background: #fff8e1; border-color: var(--gold); }
.commitment-summary.danger { background: #fdecea; border-color: var(--red); }
.cs-header { font-size: 16px; font-weight: 800; color: var(--navy); margin-bottom: 12px; }
.cs-row {
  display: grid;

  margin-bottom: 10px;
}
.cs-cell {
  background: white;
  padding: 10px 12px;

}
.cs-cell.highlight { border: 2px solid var(--gold); }
.cs-label { font-size: 11px; color: var(--grey-text); font-weight: 600; margin-bottom: 2px; }
.cs-val { font-size: 17px; font-weight: 800; color: var(--navy); font-feature-settings: "tnum"; line-height: 1.1; }
.cs-val.big { font-size: 20px; }
.cs-val.green { color: var(--green-dark); }
.cs-val.orange { color: var(--orange); }
.cs-val.red { color: var(--red); }
.cs-sub { font-size: 11px; color: var(--grey-text); margin-top: 2px; }

}

/* === Phase 6 v4 additions === */

}

}

}

.es-cell {
  display: flex;
  gap: 10px;
  background: white;
  padding: 10px 12px;
  border-radius: 8px;
  border-left: 3px solid;

}

.es-cell.none { border-left-color: var(--orange); opacity: 0.85; }
.es-icon { font-size: 22px; flex-shrink: 0; }
.es-label { font-size: 12px; color: var(--grey-text); font-weight: 600; }
.es-val { font-size: 14px; font-weight: 700; color: var(--navy); margin-top: 2px; }
.es-val.none { color: var(--orange); font-weight: 500; font-size: 13px; }

.preset-section {
  background: linear-gradient(135deg, #fffbf0, #fff8e1);

  padding: 12px 16px;

}

.prs-buttons { display: flex; flex-wrap: wrap; gap: 6px; }
.prs-btn {
  background: white;
  border: 1.5px solid var(--grey-line);
  border-radius: 99px;
  padding: 7px 14px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  color: var(--navy);
  transition: all 0.15s;
}
.prs-btn:hover { border-color: var(--navy); background: #eef5fc; }
.prs-btn.clear { color: var(--grey-text); }
.prs-btn.clear:hover { border-color: var(--red); color: var(--red); background: #fdecea; }

.check-section { margin-bottom: 18px; }
.cs-eyebrow {
  font-size: 14px;
  font-weight: 700;
  color: var(--grey-text);
  letter-spacing: 0.05em;
  margin-bottom: 10px;
  text-transform: uppercase;
}

.check-row {
  background: white;
  border: 2px solid var(--grey-line);
  border-radius: 12px;
  margin-bottom: 10px;

}

.cr-head {

}

.cr-toggle {

}

.cr-icon { font-size: 18px; }
.cr-title { font-size: 15px; font-weight: 700; color: var(--navy); }
.cr-summary { font-size: 14px; font-weight: 700; color: var(--red); font-feature-settings: "tnum"; }

.cr-body {

}

.cr-numbers {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 10px;
}
.cr-num {
  background: #fafbfc;
  border-radius: 8px;
  padding: 10px 12px;
  border: 1px solid var(--grey-line);
}
.cr-num-label { font-size: 11px; color: var(--grey-text); font-weight: 600; }
.cr-num-val { font-size: 17px; font-weight: 800; color: var(--navy); font-feature-settings: "tnum"; line-height: 1.2; }
.cr-num-val.red { color: var(--red); }
.cr-num-sub { font-size: 11px; color: var(--grey-text); margin-top: 2px; }

.cr-result {
  margin-top: 12px;
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 13px;
  border: 1px solid;
}
.cr-result.safe { background: #e8f8ef; border-color: var(--green); }
.cr-result.warning { background: #fff8e1; border-color: var(--gold); }
.cr-result.danger { background: #fdecea; border-color: var(--red); }

.gov-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  background: #eef5fc;
  border: 1.5px dashed #1a3a5c;
  padding: 8px 12px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  color: var(--navy);
  margin-bottom: 12px;
}
.gov-toggle input { width: 16px; height: 16px; cursor: pointer; }
.gov-msg {
  background: #eef5fc;
  border-left: 3px solid var(--navy);
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 13px;
  color: var(--navy);
  font-weight: 600;
}

.guide-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
  margin-bottom: 12px;
}
.guide-label {
  font-size: 12px;
  font-weight: 700;
  color: var(--grey-text);
  margin-right: 4px;
}
.guide-btn {
  background: white;
  border: 1.5px solid var(--grey-line);
  border-radius: 8px;
  padding: 8px 12px;

  font-weight: 600;

}

}
.mode-btn small { font-size: 11px; color: var(--grey-text); font-weight: 500; display: block; }

.mode-b-config {

}

.product-note {

.commitment-summary.empty {

/* === PHASE 7 v3 — สรุปแผน · Vision + Before/After === */
.vision-card {
  background: linear-gradient(135deg, #fff8e1 0%, #fffbf0 50%, #fef5e7 100%);
  border-radius: 16px;
  padding: 22px 26px;
  margin-bottom: 22px;
  border: 1.5px solid var(--gold);
  box-shadow: 0 4px 16px rgba(212, 175, 55, 0.15);
}
.vc-eyebrow {
  font-size: 12px;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.vc-narrative { font-size: 15px; color: #2c3e50; line-height: 1.8; }
.vc-main { font-size: 17px; font-weight: 600; color: var(--navy); margin-bottom: 10px; }
.vc-line { padding: 4px 0; }
.vc-pain {
  margin-top: 14px;
  padding: 12px 14px;
  background: white;
  border-radius: 10px;
  border-left: 3px solid var(--red);
}
.vc-pain-label { font-size: 12px; font-weight: 700; color: var(--grey-text); margin-bottom: 4px; }
.vc-pain-text { color: #2c3e50; line-height: 1.6; font-size: 14px; }

/* 2-column summary */
.summary-2-cols {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 22px;
}
@media (max-width:900px){ .summary-2-cols { grid-template-columns: 1fr; } }

.sum-card {
  background: white;
  border-radius: 14px;
  padding: 22px;
  border: 1.5px solid var(--grey-line);
  box-shadow: var(--shadow-sm);
  position: relative;
}
.sum-card.retire { border-top: 4px solid var(--gold); }
.sum-card.protect { border-top: 4px solid var(--green); }
.sum-icon { font-size: 28px; margin-bottom: 6px; }
.sum-title { font-size: 17px; font-weight: 800; color: var(--navy); margin-bottom: 14px; }

.sum-rows { display: flex; flex-direction: column; gap: 6px; }
.sum-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 4px 0;
}
.sum-row.big { padding: 8px 0; border-top: 2px solid var(--grey-line); margin-top: 6px; }
.sum-label { font-size: 13.5px; color: var(--grey-text); }
.sum-val { font-size: 15px; font-weight: 700; color: var(--navy); font-feature-settings: "tnum"; }
.sum-row.big .sum-val { font-size: 19px; font-weight: 800; }
.sum-val.red { color: var(--red); }
.sum-val.green { color: var(--green-dark); }

.sum-divider { border-top: 1px dashed var(--grey-line); margin: 14px 0; }

.sum-result {
  margin-top: 14px;
  padding: 10px 14px;
  border-radius: 8px;
  border: 1.5px solid;
  font-size: 13px;
}
.sum-result.safe { background: #e8f8ef; border-color: var(--green); }
.sum-result.warning { background: #fff8e1; border-color: var(--gold); }
.sum-result.danger { background: #fdecea; border-color: var(--red); }

.sum-empty {
  text-align: center;
  padding: 30px 0;
  color: var(--grey-text);
  font-size: 14px;
}
.sum-empty-sub { font-size: 12px; margin-top: 4px; }

.protect-items { display: flex; flex-direction: column; gap: 10px; }
.prot-item {
  background: #fafbfc;
  border: 1px solid var(--grey-line);
  border-radius: 8px;
  padding: 10px 12px;
}
.prot-head {
  display: flex;
  align-items: center;
  gap: 8px;
  justify-content: space-between;
  flex-wrap: wrap;
}
.prot-icon { font-size: 16px; }
.prot-label { font-weight: 700; color: var(--navy); flex: 1; font-size: 14px; }
.prot-prem { font-size: 13px; font-weight: 700; color: var(--red); font-feature-settings: "tnum"; }
.prot-detail { font-size: 12px; color: var(--grey-text); margin-top: 4px; padding-left: 24px; }

/* Final commitment */
.commit-final {
  background: white;
  border-radius: 14px;
  padding: 22px 26px;
  margin-bottom: 22px;
  border: 2px solid;
}
.commit-final.safe { border-color: var(--green); background: linear-gradient(180deg, #e8f8ef, white); }
.commit-final.warning { border-color: var(--gold); background: linear-gradient(180deg, #fff8e1, white); }
.commit-final.danger { border-color: var(--red); background: linear-gradient(180deg, #fdecea, white); }
.commit-final.empty { border-style: dashed; border-color: var(--grey-line); }

.cf-empty { text-align: center; color: var(--grey-text); padding: 16px; }
.cf-title { font-size: 17px; font-weight: 800; color: var(--navy); margin-bottom: 14px; }

.cf-grid {
  display: grid;
  grid-template-columns: 1fr auto 1fr auto 1.3fr;
  gap: 8px;
  align-items: center;
  margin-bottom: 14px;
}

  .cf-grid { grid-template-columns: 1fr; }
  .cf-plus, .cf-equals { display: none; }
}
.cf-plus, .cf-equals {
  font-size: 28px;
  font-weight: 800;
  color: var(--grey-text);
  text-align: center;
}
.cf-cell {
  background: white;
  border: 1px solid var(--grey-line);
  border-radius: 10px;
  padding: 12px 14px;
  text-align: center;
}
.cf-cell.big {
  background: linear-gradient(135deg, var(--navy), #2c5582);
  color: white;
  border-color: var(--navy);
}
.cf-label { font-size: 12px; color: var(--grey-text); font-weight: 600; margin-bottom: 4px; }
.cf-cell.big .cf-label { color: rgba(255,255,255,0.8); }
.cf-val { font-size: 19px; font-weight: 800; color: var(--navy); font-feature-settings: "tnum"; line-height: 1.2; }
.cf-cell.big .cf-val { color: white; font-size: 22px; }
.cf-sub { font-size: 12px; color: var(--grey-text); margin-top: 2px; }
.cf-cell.big .cf-sub { color: rgba(255,255,255,0.85); }

.cf-pct {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  background: white;
  padding: 10px 14px;
  border-radius: 8px;
  margin-bottom: 8px;
  font-size: 13px;
  color: var(--grey-text);
}
.cf-pct-val { font-size: 18px; font-weight: 800; color: var(--navy); }
.cf-msg {
  background: white;
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  color: var(--navy);
}

/* Before-After */
.before-after {
  background: linear-gradient(180deg, #fafbfc 0%, white 100%);
  border-radius: 14px;
  padding: 22px;
  margin-bottom: 22px;
  border: 1.5px solid var(--grey-line);
}
.ba-eyebrow {
  font-size: 12px;
  font-weight: 700;
  color: var(--grey-text);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 14px;
  text-align: center;
}
.ba-grid {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 14px;
  align-items: center;
}

.ba-arrow {
  font-size: 32px;
  color: var(--gold);

  text-align: center;
}

  border-radius: 12px;

  border: 2px solid;
}
.ba-col.before { border-color: #e8edf2; opacity: 0.85; }
.ba-col.after { border-color: var(--green); background: linear-gradient(180deg, #e8f8ef, white); }
.ba-col-title { font-size: 14px; font-weight: 800; color: var(--navy); margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px dashed var(--grey-line); }

  padding: 8px 0;
  border-bottom: 1px dashed #f0f4f8;

.ba-row:last-child { border-bottom: none; }
.ba-row-label { font-size: 13px; color: var(--grey-text); font-weight: 600; }
.ba-row-val { font-size: 14px; font-weight: 700; color: var(--navy); font-feature-settings: "tnum"; }
.ba-row-val.good { color: var(--green-dark); }
.ba-row-val.bad { color: var(--red); }
.ba-row-val.partial { color: var(--orange); }

.action-buttons {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-top: 22px;
  margin-bottom: 22px;
}

/* Print styles */
@media print {
  body { background: white; }
  .header, .sidebar, .phase-footer, .action-buttons, .toast, button { display: none !important; }

  .sum-card, .ba-col { box-shadow: none; }
}

/* === UL Insight (Phase 7 · Infinite Wealth) === */
.ul-insight {
  background: linear-gradient(135deg, #f0f7ff 0%, #fff8e1 100%);
  border: 2px solid var(--gold);
  border-radius: 14px;
  padding: 22px 26px;

<script>
/* ============================================================
   STORAGE — localStorage only (option A)
   ============================================================ */
const STORAGE_KEY = 'retirement_app_v5';
const SOUND_KEY = 'retirement_app_sound_v5';

function loadAll() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return { customers: [], activeId: null, version: 5 };
    return JSON.parse(raw);
  } catch (e) {
    console.error('Load error:', e);
    return { customers: [], activeId: null, version: 5 };
  }
}

function saveAll(data) {
  try {

/* ============================================================
   SOUND
   ============================================================ */
let soundEnabled = (localStorage.getItem(SOUND_KEY) || '1') === '1';
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { audioCtx = null; }
  }
  return audioCtx;
}

function playTone(freq, duration, type='sine', volume=0.15) {
  if (!soundEnabled) return;
  const ctx = getAudioCtx();
  if (!ctx) return;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(volume, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime + duration);
}

const SFX = {
  click: () => playTone(800, 0.05, 'sine', 0.08),
  drop: () => { playTone(400, 0.08); setTimeout(()=>playTone(600, 0.1), 50); },
  pop: () => playTone(900, 0.08, 'triangle', 0.12),
  star: () => { playTone(880, 0.1); setTimeout(()=>playTone(1320, 0.15), 80); },
  success: () => {
    playTone(523, 0.1); setTimeout(()=>playTone(659, 0.1), 100); setTimeout(()=>playTone(784, 0.2), 200);
  },
  remove: () => playTone(300, 0.1, 'sine', 0.08),
};

function toggleSound() {
  soundEnabled = !soundEnabled;
  localStorage.setItem(SOUND_KEY, soundEnabled ? '1' : '0');
  document.getElementById('soundBtn').textContent = soundEnabled ? '🔊' : '🔇';
  if (soundEnabled) SFX.click();
}

/* ============================================================
   TOAST + MODAL
   ============================================================ */
function showToast(msg, type='') {
  const root = document.getElementById('toastRoot');
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  root.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; }, 2000);
  setTimeout(() => t.remove(), 2500);
}

function confirmModal(title, body, onConfirm, confirmText='ยืนยัน') {
  const root = document.getElementById('modalRoot');
  root.innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h3>${title}</h3>
        <p>${body}</p>
        <div class="actions">
          <button class="btn-secondary" onclick="closeModal()">ยกเลิก</button>
          <button class="btn-primary" onclick="window._modalOk()">${confirmText}</button>
        </div>
      </div>
    </div>`;
  window._modalOk = () => { onConfirm(); closeModal(); };
}

function closeModal() { document.getElementById('modalRoot').innerHTML = ''; }

/* ============================================================
   NUMBER FORMATTERS — all use commas
   ============================================================ */
function fmt(n) {
  if (n === null || n === undefined || isNaN(n)) return '0';
  return Math.round(n).toLocaleString('en-US');
}

function fmtDecimal(n, decimals=2) {
  if (n === null || n === undefined || isNaN(n)) return '0.00';
  return n.toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
}

function fmtAge(dob) {
  if (!dob) return '-';
  const d = new Date(dob);
  if (isNaN(d)) return '-';
  return Math.floor((Date.now() - d.getTime()) / (365.25 * 24 * 3600 * 1000));
}

/* ============================================================
   CALCULATIONS
   ============================================================ */
function calcAnnualCashFlow(c) {
  return (c.cashFlows||[]).filter(cf => cf.useForRetirement).reduce((s, cf) => s + (Number(cf.monthly)||0)*12, 0);
}

function calcAssetsForRetirement(c) {
  return (c.assets||[]).filter(a => a.useForRetirement).reduce((s, a) => s + (Number(a.value)||0), 0);
}

function calcRetirement(c) {
  const g = c.goal || {};
  const yearsToRetire = Math.max(1, (g.retireAge||60) - (g.currentAge||30));
  const yearsRetired = Math.max(1, (g.lifeExpectancy||90) - (g.retireAge||60));
  const annualExpenseToday = g.annualExpense || 0;
  const inflationRate = 0.03;  // locked at 3%
  const withdrawalRate = 0.04; // locked at 4%
  const returnRate = (g.returnRate || 7) / 100;
  
  // Step 1: รายจ่ายตอนเกษียณ (เงินเฟ้อแล้ว)
  const inflatedAnnual = annualExpenseToday * Math.pow(1 + inflationRate, yearsToRetire);
  
  // Step 2: หัก cash flow (ถ้าดึงข้อมูลแล้ว)
  const cashFlowAnnual = g.cashFlowPulled ? (g.cashFlowAnnual || 0) : 0;
  const netAnnualNeeded = Math.max(0, inflatedAnnual - cashFlowAnnual);
  
  // Step 3: เป้ากองทุนเกษียณ
  const requiredCorpus = netAnnualNeeded / withdrawalRate;
  
  // Step 4: สินทรัพย์ที่เตรียมไว้แล้ว (ดึงแล้วเท่านั้น)
  const assetsAmount = g.assetsPulled ? (g.assetsAmount || 0) : 0;
  // Future value ของสินทรัพย์ที่มี
  const fvOfAssets = assetsAmount * Math.pow(1 + returnRate, yearsToRetire);
  const gap = Math.max(0, requiredCorpus - fvOfAssets);
  
  // Step 5: PMT - เงินที่ต้องเก็บเพิ่มต่อปี
  const compoundFactor = returnRate > 0 ? (Math.pow(1 + returnRate, yearsToRetire) - 1) / returnRate : yearsToRetire;
  const annualPMT = compoundFactor > 0 ? gap / compoundFactor : 0;
  
  return {
    yearsToRetire, yearsRetired,
    annualExpenseToday, inflatedAnnual,
    cashFlowAnnual, netAnnualNeeded,
    requiredCorpus,
    assetsAmount, fvOfAssets,
    gap, annualPMT
  };
}

/* ============================================================
   PREMIUM TABLE — Calibrated to real AIA data
   Anchor: ชาย 45 -> 35,850 บาท ต่อล้านบาททุน
   ============================================================ */
const RATE_PER_MILLION = {
  20: 12575, 21: 12740, 22: 12907, 23: 13074, 24: 13237,
  25: 13405, 26: 13571, 27: 13737, 28: 13903, 29: 14068,
  30: 14233, 31: 14464, 32: 14695, 33: 14927, 34: 15159,
  35: 15390, 36: 15689, 37: 15987, 38: 16285, 39: 16583,
  40: 16881, 41: 17277, 42: 17672, 43: 18067, 44: 18462,
  // Real anchor data from Tis (ชาย 45 = 35,850)
  // We back-fit: scale 18857 -> 35850 means scale 1.901
  // Actually let me recompute: keep ages 20-44 as before, but recalibrate from 45 up
  // Using observed: 45 -> 35,850 (single source of truth)
  45: 35850,
  46: 36850, 47: 37857, 48: 38863, 49: 39870,
  50: 40882, 51: 42139, 52: 43396, 53: 44653, 54: 45910,
  55: 47171, 56: 48740, 57: 50314, 58: 51887, 59: 53461,
  60: 55033, 61: 56918, 62: 58804, 63: 60690, 64: 62576,
  65: 64461, 66: 66662, 67: 68863, 68: 71064, 69: 73265, 70: 75466
};

// Actually, let me rebuild a smoother table using the anchor
// Since the test data shows ratio = 35,850/M at age 45 and is constant per cover (good!)
// I'll use a smooth scaling based on the original PAY20 curve
function getRatePerMillion(age) {
  const a = Math.round(Math.max(20, Math.min(70, age)));
  // The table above has a discontinuity at 45 (jumps from 18,462 to 35,850)
  // Use proper interpolation
  if (RATE_PER_MILLION[a]) return RATE_PER_MILLION[a];
  return 35850; // fallback
}

function calcPremium(age, coverBaht) {
  if (!coverBaht || coverBaht <= 0) return 0;
  const ratePerM = getRatePerMillion(age);
  return Math.round(ratePerM * coverBaht / 1000000);
}

/* ============================================================
   ROUTING
   ============================================================ */
let currentView = 'dashboard';
let currentPhase = 1;
let currentFilter = 'all';
let searchQuery = '';

function goToDashboard() {
  currentView = 'dashboard';
  APP.activeId = null;
  saveAndRefresh();
  render();
}

function openCustomer(id) {
  APP.activeId = id;
  currentView = 'customer';
  const c = getActive();
  currentPhase = c.currentPhase || 1;
  saveAndRefresh();
  render();
  SFX.click();
}

function goToPhase(n) {
  currentPhase = n;
  const c = getActive();
  if (c) {
    c.currentPhase = n;
    saveAndRefresh();
  }
  render();
  SFX.click();
}

function nextPhase() {
  const c = getActive();
  if (!c) return;
  if (!c.phasesDone.includes(currentPhase)) c.phasesDone.push(currentPhase);
  if (currentPhase < 7) goToPhase(currentPhase + 1);
  else { showToast('ทำครบทุกขั้นตอนแล้ว!', 'success'); SFX.success(); }
}

function prevPhase() { if (currentPhase > 1) goToPhase(currentPhase - 1); }

function render() {
  const app = document.getElementById('app');
  
  // Preserve focus on inputs marked with data-preserve-focus
  const activeEl = document.activeElement;
  let focusInfo = null;
  if (activeEl && activeEl.tagName === 'INPUT' && activeEl.hasAttribute('data-preserve-focus')) {
    const isNumberInput = activeEl.type === 'number';
    let selStart = null, selEnd = null;
    // type=number doesn't support selectionStart in most browsers — fall back to end of value
    if (!isNumberInput) {
      try {
        selStart = activeEl.selectionStart;
        selEnd = activeEl.selectionEnd;
      } catch(e) {}
    }
    focusInfo = {
      key: activeEl.getAttribute('data-preserve-focus'),
      isNumberInput,
      selStart,
      selEnd
    };
  }
  
  if (currentView === 'dashboard') {
    app.innerHTML = renderDashboard();
  } else {
    const c = getActive();
    if (!c) { goToDashboard(); return; }
    app.innerHTML = renderCustomerView(c);
    setTimeout(() => initPhaseInteractions(), 50);
  }
  
  // Restore focus
  if (focusInfo) {
    const el = document.querySelector(`[data-preserve-focus="${focusInfo.key}"]`);
    if (el) {
      el.focus();
      if (!focusInfo.isNumberInput && focusInfo.selStart !== null) {
        try { el.setSelectionRange(focusInfo.selStart, focusInfo.selEnd); } catch(e) {}
      }
      // For number inputs, browser puts cursor at end by default after focus() — that's what we want
    }
  }
}

/* ============================================================
   FIELD HELPERS
   ============================================================ */
function bindField(path) {
  return `oninput="updateField('${path}', this.value)"`;
}

function bindNumber(path) {
  return `oninput="updateField('${path}', Number(this.value)||0)"`;
}

function updateField(path, value) {
  const c = getActive();
  if (!c) return;
  const parts = path.split('.');
  let target = c;
  for (let i = 0; i < parts.length - 1; i++) {
    if (!target[parts[i]]) target[parts[i]] = {};
    target = target[parts[i]];
  }
  target[parts[parts.length-1]] = value;
  c.updatedAt = Date.now();
  saveAndRefresh();
  // If we're in Phase 2 and the changed field is a finance field, refresh the Cashflow Health card
  if (currentPhase === 2 && path.startsWith('finance.') && 
      ['monthlyIncome','monthlyExpense','debtHouse','debtCar','debtCard','debtOther'].includes(parts[parts.length-1])) {
    refreshCashflowHealth();
  }
}

function getFilteredCustomers() {
  const customers = APP.customers || [];
  return customers.filter(c => {
    if (currentFilter !== 'all' && c.status !== currentFilter) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      const blob = ((c.profile.name||'') + ' ' + (c.profile.nickname||'') + ' ' +
                    (c.profile.phone||'') + ' ' + (c.profile.line||'') + ' ' +
                    (c.profile.occupation||'')).toLowerCase();
      if (!blob.includes(q)) return false;
    }
    return true;
  }).sort((a,b) => (b.updatedAt||0) - (a.updatedAt||0));
}

function refreshCustomerList() {
  const container = document.getElementById('customerListContainer');
  if (!container) return;
  const filtered = getFilteredCustomers();
  const totalCustomers = (APP.customers||[]).length;
  container.innerHTML = filtered.length === 0 
    ? renderEmptyState(totalCustomers === 0)
    : `<div class="customer-grid">${filtered.map(c => renderCustomerCard(c)).join('')}</div>`;
  
  // Also refresh filter pills active state
  document.querySelectorAll('.filter-pill[data-filter]').forEach(pill => {
    const f = pill.getAttribute('data-filter');
    pill.classList.toggle('active', f === currentFilter);
  });
}

function renderEmptyState(noCustomers) {
  if (noCustomers) {
    return `<div class="empty-state"><div class="icon">👋</div>
      <h3>ยังไม่มีลูกค้า</h3><p>กดปุ่ม "เพิ่มลูกค้าใหม่" เพื่อเริ่มต้น</p>
      <button class="btn-primary" onclick="createNewCustomer()" style="margin: 0 auto;">➕ เพิ่มลูกค้าคนแรก</button>
    </div>`;
  }
  return `<div class="empty-state"><div class="icon">🔍</div>
    <h3>ไม่พบลูกค้า</h3><p>ลองล้าง filter หรือค้นหาด้วยคำอื่น</p></div>`;
}

  const updated = new Date(c.updatedAt).toLocaleDateString('th-TH', {day:'2-digit', month:'short'});
  const profileTag = c.profile.profileType ? profileTypeLabel(c.profile.profileType) : '';
  
  return `
    <div class="customer-card" onclick="openCustomer('${c.id}')">
      <div class="status-dot status-${c.status}"></div>
      <div class="name">${name} ${nick}</div>
      <div class="meta">${c.profile.occupation || '-'} · ${profileTag}</div>

      ${c.plan.premium ? `<div class="meta-row">💰 เบี้ย: <b>${fmt(c.plan.premium)}</b>/ปี</div>` : ''}
      <div class="progress-bar"><div class="progress-fill" style="width: ${phaseProgress}%"></div></div>
      <div class="progress-label"><span>Phase ${c.currentPhase}/7</span><span>${phaseProgress}% · ${updated}</span></div>
      <div class="status-tag-row" onclick="event.stopPropagation()">
        <span class="status-tag-label">สถานะ:</span>
        ${['in_progress', 'hot', 'won', 'lost', 'paused'].map(s => 
          `<button class="status-tag ${c.status===s?'active':''} status-tag-${s}" 
                   onclick="event.stopPropagation(); setCustomerStatus('${c.id}', '${s}')">
             ${statusShortLabel(s)}
           </button>`
        ).join('')}
      </div>
      <div class="actions" onclick="event.stopPropagation()">
        <button onclick="event.stopPropagation(); openCustomer('${c.id}')">📂 เปิด</button>
        <button onclick="event.stopPropagation(); duplicateCustomer('${c.id}')">📋 Copy</button>
        <button onclick="event.stopPropagation(); deleteCustomer('${c.id}')">🗑️ ลบ</button>
      </div>
    </div>`;
}

function statusShortLabel(s) {
  return {
    in_progress: '🟢 คุย',
    hot: '🟡 Hot',
    won: '✅ ปิด',
    lost: '❌ Lost',
    paused: '⏸️ พัก'
  }[s] || s;
}

function setCustomerStatus(id, status) {
  const c = APP.customers.find(x => x.id === id);
  if (!c) return;
  c.status = status;
  c.updatedAt = Date.now();
  saveAndRefresh();
  refreshCustomerList();
  // Refresh stats too
  const statsEl = document.querySelector('.stats-grid');
  if (statsEl && currentView === 'dashboard') render();
  SFX.click();
}

function setFilter(f) { currentFilter = f; refreshCustomerList(); }
function updateSearch(q) { searchQuery = q; refreshCustomerList(); }

function createNewCustomer() {
  const c = newCustomer();
  APP.customers.push(c);
  APP.activeId = c.id;
  saveAndRefresh();
  currentView = 'customer';
  currentPhase = 1;
  render();
  SFX.success();
  showToast('เพิ่มลูกค้าใหม่แล้ว', 'success');
}

function deleteCustomer(id) {
  const c = APP.customers.find(x => x.id === id);
  if (!c) return;
  confirmModal('ลบลูกค้า?',
    `ลบ "${c.profile.name || 'ลูกค้านี้'}"? การลบไม่สามารถย้อนกลับได้`,
    () => {
      APP.customers = APP.customers.filter(x => x.id !== id);
      saveAndRefresh(); render();
      SFX.remove(); showToast('ลบเรียบร้อย');
    }, 'ลบเลย');
}

function duplicateCustomer(id) {
  const c = APP.customers.find(x => x.id === id);
  if (!c) return;
  const copy = JSON.parse(JSON.stringify(c));
  copy.id = 'c_' + Date.now() + '_' + Math.floor(Math.random()*1000);
  copy.createdAt = Date.now();
  copy.updatedAt = Date.now();
  copy.profile.name = (copy.profile.name || 'ลูกค้า') + ' (สำเนา)';
  APP.customers.push(copy);
  saveAndRefresh(); render();
  showToast('คัดลอกแล้ว', 'success');
}

function exportAllJSON() {
  const data = JSON.stringify(APP, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `retirement_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Backup สำเร็จ', 'success');
}

function importAllJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.customers || !Array.isArray(data.customers)) {
        showToast('ไฟล์ไม่ถูกต้อง', 'error'); return;
      }
      confirmModal('นำเข้าข้อมูล?',
        `พบ ${data.customers.length} ลูกค้า — จะเขียนทับข้อมูลเดิม`,
        () => { APP = data; saveAndRefresh(); render(); showToast('นำเข้าสำเร็จ', 'success'); },
        'นำเข้า');
    } catch (e) { showToast('ไฟล์เสียหาย', 'error'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function exportCustomerJSON(id) {
  const c = APP.customers.find(x => x.id === id);
  if (!c) return;
  const data = JSON.stringify(c, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `customer_${c.profile.name||'unknown'}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Export สำเร็จ', 'success');
}

function renderCustomerView(c) {
  return `

function renderCustomerBanner(c) {
  const name = c.profile.name || '(ยังไม่ระบุชื่อ)';
  const age = c.profile.dob ? fmtAge(c.profile.dob) : (c.goal.currentAge || '-');
  const profileBadge = c.profile.profileType 
    ? `<span class="profile-tag">${profileTypeLabel(c.profile.profileType)}</span>` : '';
  return `
    <div class="customer-banner">
      <div>
        <h2>${name}${profileBadge}</h2>

function renderPhaseNav(c) {
  const titles = ['ลงทะเบียน','การเงิน','สินทรัพย์','Pyramid','Timeline','แผน','สรุป'];
  const items = titles.map((t,i) => {
    const n = i+1;
    const cls = (n === currentPhase ? 'active ' : '') + (c.phasesDone.includes(n) ? 'done ' : '');
    return `<button class="phase-nav-item ${cls}" onclick="goToPhase(${n})">
      <span class="num">${n}</span>${t}</button>`;
  }).join('');
  return `<div class="phase-nav">${items}</div>`;
}

function renderPhase(c, n) {
  switch(n) {
    case 1: return renderPhase1(c);
    case 2: return renderPhase2(c);
    case 3: return renderPhase3(c);
    case 4: return renderPhase4(c);
    case 5: return renderPhase5(c);
    case 6: return renderPhase6(c);
    case 7: return renderPhase7(c);
    default: return '<p>Phase not found</p>';
  }
}

function renderPhaseFooter(showNext=true) {
  return `

      ${currentPhase > 1 ? `<button class="btn-prev" onclick="prevPhase()">← ย้อนกลับ</button>` : '<div></div>'}
      ${showNext && currentPhase < 7 ? `<button class="btn-next" onclick="nextPhase()">ถัดไป →</button>` : ''}

}

function addChild() {
  const c = getActive();
  if (!c.finance) c.finance = {};
  if (!c.finance.children) c.finance.children = [];
  c.finance.children.push({ gender: 'boy', age: 0 });
  saveAndRefresh();
  render();
  // Focus the age field of the new child
  setTimeout(() => {
    const inputs = document.querySelectorAll('.child-row input[type="number"]');
    const last = inputs[inputs.length - 1];
    if (last) { last.focus(); last.select && last.select(); }
  }, 50);
}

function toggleChildGender(idx) {
  const c = getActive();
  if (!c.finance.children[idx]) return;
  c.finance.children[idx].gender = c.finance.children[idx].gender === 'boy' ? 'girl' : 'boy';
  saveAndRefresh();
  render();
}

function updateChild(idx, field, val) {
  const c = getActive();
  if (!c.finance.children[idx]) return;
  c.finance.children[idx][field] = val;
  c.updatedAt = Date.now();
  saveAndRefresh();
  // No re-render — preserve cursor while typing age
}

function removeChildItem(idx) {
  const c = getActive();
  c.finance.children.splice(idx, 1);
  saveAndRefresh();
  render();
}

function renderIncomeBreakdown(c) {

  const totalSum = items.reduce((s, it) => s + (Number(it.amount)||0), 0);
  const hasIrregular = items.some(it => it.regular === false);
  
  let html = `<div class="breakdown-zone">`;

    html += `<div class="bd-empty">ยังไม่มีรายการ — กดปุ่มด้านล่างเพื่อเพิ่ม</div>`;
  } else {

    html += `<div class="bd-summary">

  html += `<button type="button" class="bd-add" onclick="addExpenseItem()">+ เพิ่มเอง (กรอกชื่อ + เลือกหมวด)</button>`;
  if (items.length > 0) {
    html += `<div class="bd-summary">
      <span>รวมรายจ่าย</span>
      <span class="bd-total" id="bd-total-expense">${fmt(total)} ฿/เดือน</span>
    </div>`;
    if (items.some(it => it.sacred)) {
      html += `<div class="bd-tip">⭐ Sacred Zone = ค่าใช้จ่ายที่ลูกค้าให้คุณค่าทางใจ (เช่น ส่งแม่) — ห้ามเสนอตัดในการ optimize แผน</div>`;
    }
  }
  html += `</div>`;
  return html;
}

function quickAddExpense(label, category, sacred) {
  const c = getActive();
  if (!c.finance) c.finance = {};
  if (!c.finance.expenseBreakdown) c.finance.expenseBreakdown = [];
  c.finance.expenseBreakdown.push({ 
    label: label, 
    amount: 0, 
    category: category, 
    sacred: !!sacred 
  });
  saveAndRefresh();
  render();
  // Focus on the new item's amount field
  setTimeout(() => {
    const inputs = document.querySelectorAll('.exp-row input.bd-amount');
    const last = inputs[inputs.length - 1];
    if (last) { last.focus(); last.select && last.select(); }
  }, 50);
}

function cycleExpenseCategory(idx) {
  const c = getActive();
  if (!c.finance.expenseBreakdown[idx]) return;
  const item = c.finance.expenseBreakdown[idx];
  const current = classifyExpenseItem(item);
  // Cycle: needs → wants → savings → needs
  const next = current === 'needs' ? 'wants' : current === 'wants' ? 'savings' : 'needs';
  item.category = next;
  saveAndRefresh();
  render();
}

  saveAndRefresh();
  render();
}

/* ============================================================
   CASHFLOW HEALTH CHECK — 50/30/20 + Score 0-10
   ============================================================ */

// Keywords to classify expense items as "Needs"
const NEEDS_KEYWORDS = [
  'อาหาร','กิน','บ้าน','เช่า','ค่าน้ำ','ค่าไฟ','น้ำ','ไฟ','โทรศัพท์','มือถือ','เน็ต','internet',
  'ค่าเดินทาง','น้ำมัน','รถเมล์','BTS','MRT','ทางด่วน','ค่ารถ',
  'ลูก','ค่าเทอม','การศึกษา','โรงเรียน','นม','ผ้าอ้อม','child','school',
  'แม่','พ่อ','ส่งให้','พ่อแม่','parent',
  'หมอ','ยา','โรงพยาบาล','รักษา','สุขภาพ','health','medical','คลินิก',
  'ประกัน','insurance'
];

// Keywords to classify as "Savings" (these are not Wants)
const SAVINGS_KEYWORDS = [
  'เก็บ','ออม','ลงทุน','กองทุน','ซื้อหุ้น','RMF','SSF','LTF','PVD','สำรองฉุกเฉิน','saving','invest'
];

function classifyExpenseItem(item) {
  // 0. Explicit category set by user/quick-add takes priority
  if (item.category && ['needs','wants','savings'].includes(item.category)) {
    return item.category;
  }
  // 1. Sacred = always Needs (it's emotionally important to the customer)
  if (item.sacred) return 'needs';
  const label = (item.label || '').toLowerCase();
  // 2. Match savings keywords first
  for (const kw of SAVINGS_KEYWORDS) {
    if (label.includes(kw.toLowerCase())) return 'savings';
  }
  // 3. Match needs keywords
  for (const kw of NEEDS_KEYWORDS) {
    if (label.includes(kw.toLowerCase())) return 'needs';
  }
  // 4. Default → Wants
  return 'wants';
}

function calcCashflowScore(c) {
  const f = c.finance || {};
  const income = Number(f.monthlyIncome) || 0;
  const expense = Number(f.monthlyExpense) || 0;
  const debtTotal = (Number(f.debtHouse)||0) + (Number(f.debtCar)||0) + 
                    (Number(f.debtCard)||0) + (Number(f.debtOther)||0);
  
  // Total outflow
  const totalOutflow = expense + debtTotal;
  const surplus = income - totalOutflow;
  
  // Classify expenses for 50/30/20
  const breakdown = f.expenseBreakdown || [];
  let needsFromBreakdown = 0;
  let wantsFromBreakdown = 0;
  let activeSavingsFromBreakdown = 0; // intentional savings (e.g., "เก็บฉุกเฉิน 4k")
  let hasBreakdown = breakdown.length > 0;
  
  if (hasBreakdown) {
    breakdown.forEach(item => {
      const amt = Number(item.amount) || 0;
      const cls = classifyExpenseItem(item);
      if (cls === 'needs') needsFromBreakdown += amt;
      else if (cls === 'savings') activeSavingsFromBreakdown += amt;
      else wantsFromBreakdown += amt;
    });
  }
  
  // Total Needs = breakdown needs + ALL debt (housing/car/etc are needs)
  // Total Wants = breakdown wants
  // Active Savings = items lúc đầu flagged as savings (intentional discipline)
  // Surplus Savings = leftover after Needs+Wants+Active+Debt is taken out
  // Total Savings = Active + Surplus
  // If no breakdown → assume all expense is "Needs" (conservative)
  const needs = hasBreakdown ? (needsFromBreakdown + debtTotal) : (expense + debtTotal);
  const wants = hasBreakdown ? wantsFromBreakdown : 0;
  const activeSavings = activeSavingsFromBreakdown;
  // Surplus = income - all known outflow (needs + wants + active savings already counted in expense)
  const surplusSavings = Math.max(0, income - needs - wants - activeSavings);
  const savings = activeSavings + surplusSavings;
  
  // Percentages (of income)
  const needsPct = income > 0 ? (needs / income * 100) : 0;
  const wantsPct = income > 0 ? (wants / income * 100) : 0;
  const savingsPct = income > 0 ? (savings / income * 100) : 0;
  
  // === SCORING ===
  // Component 1: Savings Rate (5 pts)
  const savingsRate = income > 0 ? ((income - totalOutflow) / income * 100) : 0;
  let savingsScore = 0;
  if (savingsRate >= 20) savingsScore = 5;
  else if (savingsRate >= 15) savingsScore = 4;
  else if (savingsRate >= 10) savingsScore = 3;
  else if (savingsRate >= 5) savingsScore = 2;
  else if (savingsRate > 0) savingsScore = 1;
  else savingsScore = 0;
  
  // Component 2: Debt Burden (3 pts)
  const debtRatio = income > 0 ? (debtTotal / income * 100) : 0;
  let debtScore = 0;
  if (debtRatio === 0) debtScore = 3;
  else if (debtRatio <= 35) debtScore = 3;
  else if (debtRatio <= 50) debtScore = 2;
  else if (debtRatio <= 65) debtScore = 1;
  else debtScore = 0;
  
  // Component 3: Emergency Buffer (2 pts)
  // Pull from Phase 3 assets if available (cash/deposit type)
  let emergencyMonths = 0;
  let emergencyAssumed = true;
  if (c.assets && c.assets.length > 0) {
    const cashAssets = c.assets.filter(a => 
      /ฝาก|cash|เงินสด|ฉุกเฉิน|สำรอง|ออม/i.test((a.name||'') + ' ' + (a.type||''))
    );
    const cashTotal = cashAssets.reduce((s, a) => s + (Number(a.value)||0), 0);
    if (cashTotal > 0) {
      emergencyMonths = expense > 0 ? cashTotal / expense : 0;
      emergencyAssumed = false;
    }
  }
  if (emergencyAssumed) emergencyMonths = 6; // assumed default when no Phase 3 cash data yet
  
  let emergencyScore = 0;
  if (emergencyMonths >= 6) emergencyScore = 2;
  else if (emergencyMonths >= 3) emergencyScore = 1;
  else emergencyScore = 0;
  
  const totalScore = savingsScore + debtScore + emergencyScore;
  
  // Tier
  let tier, tierColor, tierEmoji;
  if (totalScore >= 8) { tier = 'Wealth Builder'; tierColor = 'green'; tierEmoji = '🟢'; }
  else if (totalScore >= 6) { tier = 'On Track'; tierColor = 'yellow'; tierEmoji = '🟡'; }
  else if (totalScore >= 4) { tier = 'Cash Strapped'; tierColor = 'orange'; tierEmoji = '🟠'; }
  else { tier = 'Survival Mode'; tierColor = 'red'; tierEmoji = '🔴'; }
  
  return {
    income, expense, debtTotal, totalOutflow, surplus,
    needs, wants, savings, activeSavings, surplusSavings,
    needsPct, wantsPct, savingsPct,
    savingsRate, debtRatio, emergencyMonths, emergencyAssumed,
    savingsScore, debtScore, emergencyScore,
    totalScore, tier, tierColor, tierEmoji,
    hasBreakdown
  };
}
